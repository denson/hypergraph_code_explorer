<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Panel Demo: Right Drawer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e8; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; overflow:hidden; }

#sidebar {
  position:fixed; left:0; top:0; width:320px; height:100vh;
  background:linear-gradient(180deg,#0d0d24 0%,#0a0a1a 100%);
  border-right:1px solid #1a1a3a; z-index:10; display:flex; flex-direction:column;
  overflow:hidden;
}
#sidebar h1 { font-size:1.1rem; padding:16px 16px 4px; color:#fff; font-weight:600; }
#sidebar .subtitle { font-size:0.75rem; padding:0 16px 12px; color:#888; }
.section-label {
  font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em;
  color:#556; padding:4px 16px 2px; font-weight:600;
}
#tour-list { padding:4px 8px 8px; flex-shrink:0; display:flex; flex-wrap:wrap; gap:4px; }
#search-suggestions { display:none; padding:0 16px 6px; font-size:0.7rem; color:#556; }
#search-suggestions span { color:#7788aa; cursor:pointer; margin-right:8px; transition:color 0.15s; }
#search-suggestions span:hover { color:#aaccee; }
.tour-btn {
  padding:5px 10px; border-radius:12px; border:1px solid #2a2a4a;
  background:#12122a; color:#aaa; font-size:0.72rem; cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.tour-btn:hover { border-color:#5a5a8a; color:#ddd; }
.tour-btn.active { border-color:var(--tour-color,#00d4ff); color:#fff; background:#1a1a3a; }
#narrative {
  flex:1; overflow-y:auto; padding:12px 16px;
  scrollbar-width:thin; scrollbar-color:#2a2a4a transparent;
}
#narrative::-webkit-scrollbar { width:6px; }
#narrative::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:3px; }
.step {
  padding:10px 12px; margin-bottom:8px; border-radius:8px;
  background:#0f0f28; border:1px solid #1a1a3a; cursor:pointer;
  font-size:0.82rem; line-height:1.5; transition:all 0.2s; color:#ccc;
}
.step:hover { border-color:#3a3a5a; background:#14142e; }
.step.active { border-color:var(--tour-color,#00d4ff); background:#1a1a34; }
.step .tc { font-weight:600; }
#controls {
  padding:10px 16px; border-top:1px solid #1a1a3a;
  display:flex; gap:6px; flex-wrap:wrap; flex-shrink:0;
}
.ctrl-btn {
  padding:4px 10px; border-radius:10px; border:1px solid #2a2a4a;
  background:#12122a; color:#aaa; font-size:0.7rem; cursor:pointer;
  transition:all 0.2s;
}
.ctrl-btn:hover { border-color:#5a5a8a; color:#ddd; }
.ctrl-btn.on { border-color:#00d4ff; color:#00d4ff; }

#graph-container {
  position:fixed; left:320px; top:0; right:0; bottom:0;
  transition: right 0.3s ease;
}
svg { width:100%; height:100%; }
#tooltip {
  position:fixed; display:none; padding:8px 12px; border-radius:6px;
  background:rgba(10,10,26,0.95); border:1px solid #3a3a5a;
  font-size:0.78rem; pointer-events:none; z-index:20; max-width:300px;
  color:#ddd; line-height:1.4;
}
#search-box {
  margin:0 16px 8px; padding:6px 10px; border-radius:8px;
  border:1px solid #2a2a4a; background:#0a0a1a; color:#ddd;
  font-size:0.78rem; width:calc(100% - 32px); outline:none;
}
#search-box:focus { border-color:#5a5a8a; }
#search-box::placeholder { color:#555; }

/* ── RIGHT DRAWER ────────────────────────────────────────────── */
#detail-drawer {
  position:fixed; top:0; right:-400px; width:400px; height:100vh;
  background:linear-gradient(180deg,#0d0d24 0%,#0a0a1a 100%);
  border-left:1px solid #1a1a3a; z-index:15;
  display:flex; flex-direction:column;
  transition: right 0.3s ease;
  overflow:hidden;
}
#detail-drawer.open { right:0; }
body.drawer-open #graph-container { right:400px; }

#detail-drawer-header {
  padding:14px 16px 10px; border-bottom:1px solid #1a1a3a;
  display:flex; align-items:flex-start; justify-content:space-between;
  flex-shrink:0;
}
#detail-drawer-header .detail-id {
  font-size:0.95rem; font-weight:600; color:#fff;
  word-break:break-all; flex:1; margin-right:8px;
}
#detail-close {
  width:28px; height:28px; border-radius:6px; border:1px solid #2a2a4a;
  background:#12122a; color:#888; font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0;
}
#detail-close:hover { border-color:#5a5a8a; color:#ddd; }

#detail-content {
  flex:1; overflow-y:auto; padding:0 16px 16px;
  scrollbar-width:thin; scrollbar-color:#2a2a4a transparent;
}
#detail-content::-webkit-scrollbar { width:6px; }
#detail-content::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:3px; }

.detail-meta {
  display:flex; gap:8px; flex-wrap:wrap; padding:8px 0 12px;
  font-size:0.72rem;
}
.detail-badge {
  padding:3px 8px; border-radius:10px; border:1px solid #2a2a4a;
  background:#12122a;
}
.detail-badge.group { border-left:3px solid var(--group-color, #556); }

.detail-section {
  margin-bottom:14px;
}
.detail-section-title {
  font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em;
  color:#556; font-weight:600; padding:8px 0 6px;
  border-bottom:1px solid #1a1a3a; margin-bottom:8px;
}

.detail-edge-group {
  margin-bottom:6px; line-height:1.7;
}
.detail-edge-label {
  font-size:0.7rem; color:#7788aa; margin-right:6px;
  font-style:italic;
}
.detail-edge-target {
  display:inline-block; padding:2px 7px; margin:2px 3px; border-radius:6px;
  background:#12122a; border:1px solid #2a2a4a;
  font-size:0.72rem; color:#aabbcc; cursor:pointer;
  transition:all 0.15s;
}
.detail-edge-target:hover {
  border-color:#5580aa; color:#ddeeff; background:#1a1a3a;
}

.detail-tour {
  padding:6px 10px; margin-bottom:4px; border-radius:6px;
  background:#0f0f28; border:1px solid #1a1a3a;
  border-left:3px solid var(--tour-color, #556);
  font-size:0.78rem; color:#bbc;
}

.detail-source {
  padding:10px 12px; border-radius:6px; background:#08081a;
  border:1px solid #1a1a3a; font-family:'Cascadia Code','Fira Code',monospace;
  font-size:0.72rem; color:#8899aa; line-height:1.5;
  overflow-x:auto; white-space:pre-wrap; word-break:break-all;
}

.detail-empty {
  color:#556; font-size:0.8rem; text-align:center; padding:40px 16px;
}

.detail-hint {
  color:#445; font-size:0.7rem; text-align:center; padding:20px 0;
  font-style:italic;
}
</style>
</head>
<body>
<div id="sidebar">
  <h1 id="viz-title">Bug #13399 — Right Drawer Demo</h1>
  <div class="subtitle" id="viz-subtitle"></div>
  <input type="text" id="search-box" placeholder="Search symbols..." />
  <div id="search-suggestions"></div>
  <div class="section-label">Guided Tours</div>
  <div id="tour-list"></div>
  <div id="narrative"></div>
  <div id="controls">
    <button class="ctrl-btn on" id="btn-live">Live</button>
    <button class="ctrl-btn" id="btn-reset">Reset View</button>
  </div>
</div>
<div id="graph-container"><svg id="graph-svg"></svg></div>
<div id="tooltip"></div>

<div id="detail-drawer">
  <div id="detail-drawer-header">
    <div class="detail-id" id="detail-title">—</div>
    <button id="detail-close">✕</button>
  </div>
  <div id="detail-content">
    <div class="detail-hint">Click a node in the graph to inspect it.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="_data.js"></script>
<script>
// ── EXPAND RAW DATA ─────────────────────────────────────────────────
const nodes = _raw.n.map(n => ({id:n.i, label:n.l, group:n.g, degree:n.d, importance:n.p, language:n.ln||'other'}));
const edges = _raw.e.map(e => ({source:e.s, target:e.t, type:e.y, file:e.f}));

// ── PALETTES ────────────────────────────────────────────────────────
const PALETTE_DEFAULT = {
  gc: Object.assign({other:'#555570'}, typeof _groupColors !== 'undefined' ? _groupColors : {}),
  ec: {DEFINES:'#555580', CALLS:'#00d4ff', INHERITS:'#ff8c42', DECORATES:'#9c27b0', RAISES:'#ff4466'}
};
let palette = PALETTE_DEFAULT;
let frozen = false, breathPhase = 0, breathInterval;
let activeTourIdx = -1, activeStepIdx = -1;
let simulation, svgEl, g, gLinks, gNodes, gLabels, zoomBehavior;
let linkSel, nodeSel, labelSel;

function nodeColor(d) { return palette.gc[d.group] || palette.gc.other || '#555570'; }
function edgeColor(d) { return palette.ec[d.type] || '#333'; }
function nodeRadius(d) {
  if (d.importance >= 30) return 10;
  if (d.importance >= 15) return 7;
  if (d.importance >= 5) return 4.5;
  return 2.5;
}

// ── SVG SETUP ───────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const W = container.clientWidth, H = container.clientHeight;
svgEl = d3.select('#graph-svg');

const defs = svgEl.append('defs');
const blurFilter = defs.append('filter').attr('id','blur-cloud');
blurFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','1.5');
const glowFilter = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
glowFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','3').attr('result','blur');
const glowMerge = glowFilter.append('feMerge');
glowMerge.append('feMergeNode').attr('in','blur');
glowMerge.append('feMergeNode').attr('in','SourceGraphic');
const pulseFilter = defs.append('filter').attr('id','pulse-glow').attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
pulseFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','6').attr('result','blur');
const pulseMerge = pulseFilter.append('feMerge');
pulseMerge.append('feMergeNode').attr('in','blur');
pulseMerge.append('feMergeNode').attr('in','SourceGraphic');

g = svgEl.append('g').attr('id','graph-g');
zoomBehavior = d3.zoom().scaleExtent([0.05, 8])
  .on('zoom', e => g.attr('transform', e.transform));
svgEl.call(zoomBehavior);
gLinks  = g.append('g').attr('class','links');
gNodes  = g.append('g').attr('class','nodes');
gLabels = g.append('g').attr('class','labels');

// ── FORCE SIMULATION ────────────────────────────────────────────────
simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d=>d.id)
    .distance(d => d.type==='DEFINES'?35 : d.type==='INHERITS'?55 : 70)
    .strength(d => d.type==='DEFINES'?0.7 : d.type==='INHERITS'?0.45 : 0.25))
  .force('charge', d3.forceManyBody().strength(-30).distanceMax(250))
  .force('center', d3.forceCenter(W/2+80, H/2))
  .force('x', d3.forceX(W/2+80).strength(0.015))
  .force('y', d3.forceY(H/2).strength(0.015))
  .force('collision', d3.forceCollide().radius(d=>nodeRadius(d)+1))
  .on('tick', ticked);

// ── DRAW ELEMENTS ───────────────────────────────────────────────────
linkSel = gLinks.selectAll('line').data(edges).join('line')
  .attr('stroke', edgeColor)
  .attr('stroke-width', d => d.type==='CALLS'?0.8 : d.type==='INHERITS'?1.2 : 0.4)
  .attr('stroke-opacity', d => d.type==='DEFINES'?0.15 : 0.3);

nodeSel = gNodes.selectAll('circle').data(nodes).join('circle')
  .attr('r', nodeRadius)
  .attr('fill', nodeColor)
  .attr('stroke', '#0a0a1a').attr('stroke-width', 0.5)
  .attr('filter', d => d.importance<5?'url(#blur-cloud)' : d.importance>=30?'url(#glow)':null)
  .attr('fill-opacity', d => d.importance<5?0.4 : 0.9)
  .call(d3.drag().on('start',dragStart).on('drag',dragging).on('end',dragEnd));

labelSel = gLabels.selectAll('text').data(nodes).join('text')
  .text(d=>d.label)
  .attr('font-size', d => d.importance>=30?'10px' : d.importance>=15?'8px' : d.importance>=5?'6px':'0px')
  .attr('fill', nodeColor)
  .attr('fill-opacity', d => d.importance>=15?0.9 : d.importance>=5?0.5 : 0)
  .attr('stroke','#0a0a12').attr('stroke-width',3)
  .attr('stroke-opacity', d => d.importance>=15?0.9 : d.importance>=5?0.5 : 0)
  .attr('paint-order','stroke')
  .attr('dx', d => nodeRadius(d)+3).attr('dy','0.35em')
  .attr('pointer-events','none');

// ── TOOLTIP ─────────────────────────────────────────────────────────
const tooltip = d3.select('#tooltip');
nodeSel.on('mouseover', (ev,d) => {
  tooltip.style('display','block')
    .html(`<strong>${d.id}</strong><br>Group: ${d.group}<br>Degree: ${d.degree} · Importance: ${d.importance}`);
}).on('mousemove', ev => {
  tooltip.style('left',(ev.clientX+12)+'px').style('top',(ev.clientY-10)+'px');
}).on('mouseout', () => tooltip.style('display','none'));

function ticked() {
  linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('cx',d=>d.x).attr('cy',d=>d.y);
  labelSel.attr('x',d=>d.x).attr('y',d=>d.y);
}
function dragStart(ev,d) { if(!ev.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dragging(ev,d) { d.fx=ev.x; d.fy=ev.y; }
function dragEnd(ev,d) { if(!ev.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

// ── BREATHING ───────────────────────────────────────────────────────
function startBreathing() {
  breathInterval = setInterval(() => {
    if (frozen) return;
    breathPhase++;
    const wx = Math.sin(breathPhase*0.07)*18, wy = Math.cos(breathPhase*0.05)*12;
    simulation.force('x', d3.forceX(W/2+80+wx).strength(0.018))
              .force('y', d3.forceY(H/2+wy).strength(0.018));
    if (breathPhase%16===0) simulation.alpha(Math.max(simulation.alpha(),0.04)).restart();
  }, 500);
}
startBreathing();

function setLabelOpacity(sel, dur, opFn) {
  sel.transition().duration(dur)
    .attr('fill', nodeColor)
    .attr('fill-opacity', opFn)
    .attr('stroke-opacity', opFn);
}

// ── TOUR SYSTEM ─────────────────────────────────────────────────────
function isTourNode(d, tour) {
  return tour.keywords.some(k => d.id===k || d.id.startsWith(k+'.') || d.id.startsWith(k));
}
function getConnectedNodes(tourNodeIds) {
  const connected = new Set();
  edges.forEach(e => {
    const sid = typeof e.source==='object'?e.source.id:e.source;
    const tid = typeof e.target==='object'?e.target.id:e.target;
    if (e.type!=='DEFINES') {
      if (tourNodeIds.has(sid)) connected.add(tid);
      if (tourNodeIds.has(tid)) connected.add(sid);
    }
  });
  return connected;
}
function activateTour(idx) {
  activeTourIdx = idx;
  activeStepIdx = -1;
  document.querySelectorAll('.tour-btn').forEach((b,i) => {
    b.classList.toggle('active', i===idx);
    if(i===idx) b.style.setProperty('--tour-color', tours[i].color||'#00d4ff');
  });
  if (idx < 0 || idx >= tours.length) { resetView(); return; }
  const tour = tours[idx];
  const tourColor = tour.color || '#00d4ff';
  const narDiv = document.getElementById('narrative');
  narDiv.innerHTML = '';
  narDiv.style.setProperty('--tour-color', tourColor);
  tour.steps.forEach((s,si) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = s.text;
    div.querySelectorAll('.tc').forEach(el => el.style.color = tourColor);
    div.onclick = () => spotlightStep(si);
    narDiv.appendChild(div);
  });
  const tourNodeIds = new Set();
  nodes.forEach(d => { if(isTourNode(d,tour)) tourNodeIds.add(d.id); });
  const connected = getConnectedNodes(tourNodeIds);
  nodeSel.transition().duration(600)
    .attr('fill', nodeColor)
    .attr('fill-opacity', d => tourNodeIds.has(d.id)?1 : connected.has(d.id)?0.3 : 0.04)
    .attr('filter', d => tourNodeIds.has(d.id)?'url(#glow)':null)
    .attr('r', d => tourNodeIds.has(d.id)?nodeRadius(d)*1.3:nodeRadius(d));
  setLabelOpacity(labelSel, 600, d => tourNodeIds.has(d.id)?1 : connected.has(d.id)?0.2 : 0);
  labelSel.transition().duration(600)
    .attr('font-size', d => tourNodeIds.has(d.id)?'10px' : connected.has(d.id)?'6px':'0px');
  linkSel.transition().duration(600)
    .attr('stroke-opacity', d => {
      const sid = typeof d.source==='object'?d.source.id:d.source;
      const tid = typeof d.target==='object'?d.target.id:d.target;
      if(tourNodeIds.has(sid)&&tourNodeIds.has(tid)) return 0.7;
      if(tourNodeIds.has(sid)||tourNodeIds.has(tid)) return 0.15;
      return 0.01;
    });
  zoomToNodes([...tourNodeIds]);
}
function spotlightStep(si) {
  activeStepIdx = si;
  document.querySelectorAll('.step').forEach((s,i) => s.classList.toggle('active',i===si));
  const tour = tours[activeTourIdx];
  const step = tour.steps[si];
  if (!step || !step.node) return;
  const target = nodes.find(n => n.id === step.node);
  if (!target) return;
  const scale = 1.3;
  svgEl.transition().duration(800).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2-(target.x*scale), H/2-(target.y*scale)).scale(scale)
  );
}
function zoomToNodes(nodeIds) {
  const pts = nodes.filter(n => nodeIds.includes(n.id));
  if (!pts.length) return;
  const xs = pts.map(n=>n.x), ys = pts.map(n=>n.y);
  const x0=Math.min(...xs)-60, x1=Math.max(...xs)+60, y0=Math.min(...ys)-60, y1=Math.max(...ys)+60;
  const bw=x1-x0, bh=y1-y0;
  const scale = Math.min(W/bw, H/bh, 2) * 0.85;
  const cx = (x0+x1)/2, cy = (y0+y1)/2;
  svgEl.transition().duration(800).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2-cx*scale, H/2-cy*scale).scale(scale)
  );
}
function resetView() {
  activeTourIdx = -1; activeStepIdx = -1;
  document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('narrative').innerHTML = '<div style="color:#666;font-size:0.8rem;padding:20px 0;">Select a tour to explore, or click any node for details.</div>';
  nodeSel.transition().duration(600)
    .attr('fill', nodeColor)
    .attr('fill-opacity', d => d.importance<5?0.4:0.9)
    .attr('filter', d => d.importance<5?'url(#blur-cloud)':d.importance>=30?'url(#glow)':null)
    .attr('r', nodeRadius);
  setLabelOpacity(labelSel, 600, d => d.importance>=15?0.9 : d.importance>=5?0.5 : 0);
  labelSel.transition().duration(600)
    .attr('font-size', d => d.importance>=30?'10px':d.importance>=15?'8px':d.importance>=5?'6px':'0px');
  linkSel.transition().duration(600)
    .attr('stroke', edgeColor)
    .attr('stroke-opacity', d => d.type==='DEFINES'?0.15:0.3);
  svgEl.transition().duration(800).call(zoomBehavior.transform, d3.zoomIdentity.translate(0,0).scale(1));
}

// ── SEARCH ──────────────────────────────────────────────────────────
const searchBox = document.getElementById('search-box');
let searchTimeout;
searchBox.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = searchBox.value.trim().toLowerCase();
    if (!q) { if(activeTourIdx>=0) activateTour(activeTourIdx); else resetView(); return; }
    const matches = new Set();
    nodes.forEach(d => { if(d.id.toLowerCase().includes(q)||d.label.toLowerCase().includes(q)) matches.add(d.id); });
    const connected = getConnectedNodes(matches);
    nodeSel.transition().duration(400)
      .attr('fill-opacity', d => matches.has(d.id)?1 : connected.has(d.id)?0.2 : 0.03)
      .attr('r', d => matches.has(d.id)?nodeRadius(d)*1.5:nodeRadius(d))
      .attr('filter', d => matches.has(d.id)?'url(#glow)':null);
    setLabelOpacity(labelSel, 400, d => matches.has(d.id)?1 : 0);
    labelSel.transition().duration(400)
      .attr('font-size', d => matches.has(d.id)?'10px':'0px');
    linkSel.transition().duration(400)
      .attr('stroke-opacity', d => {
        const sid=typeof d.source==='object'?d.source.id:d.source;
        const tid=typeof d.target==='object'?d.target.id:d.target;
        if(matches.has(sid)||matches.has(tid)) return 0.5;
        return 0.01;
      });
    if(matches.size>0 && matches.size<=30) zoomToNodes([...matches]);
  }, 250);
});

// ── BUILD TOUR BUTTONS ──────────────────────────────────────────────
const tourList = document.getElementById('tour-list');
tours.forEach((t,i) => {
  const btn = document.createElement('button');
  btn.className = 'tour-btn';
  btn.textContent = t.name.length > 40 ? t.name.slice(0,37)+'...' : t.name;
  btn.title = t.name;
  btn.onclick = () => activateTour(activeTourIdx===i ? -1 : i);
  tourList.appendChild(btn);
});

document.getElementById('viz-subtitle').textContent = `${nodes.length} symbols · ${edges.length} edges`;
document.getElementById('btn-live').onclick = function() {
  frozen = !frozen;
  this.textContent = frozen ? 'Frozen' : 'Live';
  this.classList.toggle('on', !frozen);
  if (!frozen) simulation.alpha(0.05).restart();
};
document.getElementById('btn-reset').onclick = resetView;

// ── DETAIL INDEX ────────────────────────────────────────────────────
const TYPE_LABELS = {
  CALLS:     {out:'calls →', in:'← called by'},
  IMPORTS:   {out:'imports →', in:'← imported by'},
  DEFINES:   {out:'defines →', in:'← defined in'},
  INHERITS:  {out:'inherits from →', in:'← inherited by'},
  SIGNATURE: {out:'has param →', in:'← param of'},
  RAISES:    {out:'raises →', in:'← raised by'},
  DECORATES: {out:'decorates →', in:'← decorated by'},
};

function buildDetailIndex() {
  const idx = {};
  nodes.forEach(n => {
    idx[n.id] = { node: n, outgoing: {}, incoming: {}, tours: [], files: new Set() };
  });
  edges.forEach(e => {
    const sid = typeof e.source==='object' ? e.source.id : e.source;
    const tid = typeof e.target==='object' ? e.target.id : e.target;
    if (idx[sid]) {
      if (!idx[sid].outgoing[e.type]) idx[sid].outgoing[e.type] = [];
      idx[sid].outgoing[e.type].push({id:tid, file:e.file});
      if (e.file) idx[sid].files.add(e.file);
    }
    if (idx[tid]) {
      if (!idx[tid].incoming[e.type]) idx[tid].incoming[e.type] = [];
      idx[tid].incoming[e.type].push({id:sid, file:e.file});
      if (e.file) idx[tid].files.add(e.file);
    }
  });
  tours.forEach(t => {
    const kws = t.keywords || [];
    nodes.forEach(n => {
      if (kws.some(k => n.id===k || n.id.startsWith(k+'.') || n.id.endsWith('.'+k))) {
        idx[n.id].tours.push({ name:t.name, color:t.color });
      }
    });
  });
  Object.values(idx).forEach(d => {
    const seen = new Set();
    d.tours = d.tours.filter(t => seen.has(t.name) ? false : (seen.add(t.name), true));
  });
  return idx;
}
const detailIndex = buildDetailIndex();

// ── DETAIL RENDERER ─────────────────────────────────────────────────
function renderDetail(nodeId) {
  const d = detailIndex[nodeId];
  if (!d) return '<div class="detail-empty">No data available.</div>';
  const n = d.node;
  const gc = palette.gc[n.group] || palette.gc.other || '#555570';

  document.getElementById('detail-title').textContent = n.id;

  let html = '';

  // Meta badges
  html += '<div class="detail-meta">';
  html += `<span class="detail-badge group" style="--group-color:${gc}">${n.group}</span>`;
  html += `<span class="detail-badge">importance ${n.importance}</span>`;
  html += `<span class="detail-badge">degree ${n.degree}</span>`;
  const files = [...d.files];
  if (files.length) html += `<span class="detail-badge">${files[0]}</span>`;
  html += '</div>';

  // Connections
  const allTypes = new Set([...Object.keys(d.outgoing), ...Object.keys(d.incoming)]);
  if (allTypes.size) {
    html += '<div class="detail-section"><div class="detail-section-title">Connections</div>';
    for (const type of ['CALLS','IMPORTS','DEFINES','INHERITS','SIGNATURE','RAISES','DECORATES']) {
      if (!allTypes.has(type)) continue;
      const labels = TYPE_LABELS[type] || {out:type+' →', in:'← '+type};
      const out = d.outgoing[type] || [];
      const inc = d.incoming[type] || [];
      if (out.length) {
        html += `<div class="detail-edge-group"><span class="detail-edge-label">${labels.out}</span>`;
        out.slice(0,15).forEach(e => {
          const lbl = e.id.includes('.') ? e.id.split('.').pop() : e.id;
          html += `<span class="detail-edge-target" data-node="${e.id}" title="${e.id}">${lbl}</span>`;
        });
        if (out.length > 15) html += `<span class="detail-edge-label">+${out.length-15} more</span>`;
        html += '</div>';
      }
      if (inc.length) {
        html += `<div class="detail-edge-group"><span class="detail-edge-label">${labels.in}</span>`;
        inc.slice(0,15).forEach(e => {
          const lbl = e.id.includes('.') ? e.id.split('.').pop() : e.id;
          html += `<span class="detail-edge-target" data-node="${e.id}" title="${e.id}">${lbl}</span>`;
        });
        if (inc.length > 15) html += `<span class="detail-edge-label">+${inc.length-15} more</span>`;
        html += '</div>';
      }
    }
    html += '</div>';
  }

  // Tours
  if (d.tours.length) {
    html += '<div class="detail-section"><div class="detail-section-title">Referenced in Tours</div>';
    d.tours.forEach(t => {
      html += `<div class="detail-tour" style="--tour-color:${t.color}">${t.name}</div>`;
    });
    html += '</div>';
  }

  // Source placeholder
  html += '<div class="detail-section"><div class="detail-section-title">Source</div>';
  html += `<pre class="detail-source">`;
  html += `# Source chunk from builder._chunk_registry\n`;
  html += `# File: ${files[0] || '(unknown)'}\n\n`;
  if (d.outgoing.DEFINES) {
    html += `# ${n.id} defines:\n`;
    d.outgoing.DEFINES.slice(0,8).forEach(e => { html += `#   ${e.id}\n`; });
  }
  if (d.outgoing.CALLS) {
    html += `# ${n.id} calls:\n`;
    d.outgoing.CALLS.slice(0,8).forEach(e => { html += `#   ${e.id}\n`; });
  }
  if (d.incoming.CALLS) {
    html += `# Called by:\n`;
    d.incoming.CALLS.slice(0,8).forEach(e => { html += `#   ${e.id}\n`; });
  }
  html += '</pre></div>';

  return html;
}

// ── DRAWER OPEN/CLOSE ───────────────────────────────────────────────
const drawer = document.getElementById('detail-drawer');
const detailContent = document.getElementById('detail-content');
let activeDetailNode = null;

function openDrawer(nodeId) {
  activeDetailNode = nodeId;
  detailContent.innerHTML = renderDetail(nodeId);
  drawer.classList.add('open');
  document.body.classList.add('drawer-open');

  // Wire up clickable edge targets inside the drawer
  detailContent.querySelectorAll('.detail-edge-target').forEach(el => {
    el.addEventListener('click', () => {
      const targetId = el.dataset.node;
      if (detailIndex[targetId]) openDrawer(targetId);
    });
  });
}
function closeDrawer() {
  activeDetailNode = null;
  drawer.classList.remove('open');
  document.body.classList.remove('drawer-open');
}

document.getElementById('detail-close').onclick = closeDrawer;

// ── NODE CLICK → OPEN DRAWER ────────────────────────────────────────
nodeSel.on('click', (ev, d) => {
  ev.stopPropagation();
  openDrawer(d.id);
});
svgEl.on('click', () => {
  if (activeDetailNode) closeDrawer();
});

// ── KEYBOARD ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target === searchBox) return;
  if (e.key === 'Escape') {
    if (activeDetailNode) closeDrawer();
    else resetView();
  }
  if (e.key==='ArrowRight'||e.key==='ArrowDown') {
    e.preventDefault();
    if (activeTourIdx>=0 && activeStepIdx < tours[activeTourIdx].steps.length-1) spotlightStep(activeStepIdx+1);
    else if (activeTourIdx<0 && tours.length) activateTour(0);
  }
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') {
    e.preventDefault();
    if (activeStepIdx>0) spotlightStep(activeStepIdx-1);
  }
});

// ── SEARCH SUGGESTIONS ──────────────────────────────────────────────
const suggestionsEl = document.getElementById('search-suggestions');
const topNodes = [...nodes].sort((a,b) => b.importance - a.importance).slice(0, 6);
if (topNodes.length) {
  suggestionsEl.style.display = 'block';
  suggestionsEl.innerHTML = 'Try: ' + topNodes.map(n =>
    `<span data-q="${n.label}">${n.label}</span>`
  ).join('');
  suggestionsEl.querySelectorAll('span').forEach(el => {
    el.onclick = () => { searchBox.value = el.dataset.q; searchBox.dispatchEvent(new Event('input')); };
  });
}

resetView();
</script>
