<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e8; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; overflow:hidden; }
#sidebar {
  position:fixed; left:0; top:0; width:320px; height:100vh;
  background:linear-gradient(180deg,#0d0d24 0%,#0a0a1a 100%);
  border-right:1px solid #1a1a3a; z-index:10; display:flex; flex-direction:column;
  overflow:hidden;
}
#sidebar h1 { font-size:1.1rem; padding:16px 16px 4px; color:#fff; font-weight:600; }
#sidebar .subtitle { font-size:0.75rem; padding:0 16px 12px; color:#888; }
.section-label {
  font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em;
  color:#556; padding:4px 16px 2px; font-weight:600;
}
.section-label .help-toggle { color:#5580aa; cursor:pointer; font-weight:400; text-transform:none; letter-spacing:0; }
.section-label .help-toggle:hover { color:#88aacc; text-decoration:underline; }
#tour-list { padding:4px 8px 8px; flex-shrink:0; display:flex; flex-wrap:wrap; gap:4px; }
#search-suggestions {
  display:none; padding:0 16px 6px; font-size:0.7rem; color:#556;
}
#search-suggestions span {
  color:#7788aa; cursor:pointer; margin-right:8px; transition:color 0.15s;
}
#search-suggestions span:hover { color:#aaccee; }
.tour-btn {
  padding:5px 10px; border-radius:12px; border:1px solid #2a2a4a;
  background:#12122a; color:#aaa; font-size:0.72rem; cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.tour-btn:hover { border-color:#5a5a8a; color:#ddd; }
.tour-btn.active { border-color:var(--tour-color,#00d4ff); color:#fff; background:#1a1a3a; }
#narrative {
  flex:1; overflow-y:auto; padding:12px 16px;
  scrollbar-width:thin; scrollbar-color:#2a2a4a transparent;
}
#narrative::-webkit-scrollbar { width:6px; }
#narrative::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:3px; }
.step {
  padding:10px 12px; margin-bottom:8px; border-radius:8px;
  background:#0f0f28; border:1px solid #1a1a3a; cursor:pointer;
  font-size:0.82rem; line-height:1.5; transition:all 0.2s; color:#ccc;
}
.step:hover { border-color:#3a3a5a; background:#14142e; }
.step.active { border-color:var(--tour-color,#00d4ff); background:#1a1a34; }
.step .tc { font-weight:600; }
#controls {
  padding:10px 16px; border-top:1px solid #1a1a3a;
  display:flex; gap:6px; flex-wrap:wrap; flex-shrink:0;
}
.ctrl-btn {
  padding:4px 10px; border-radius:10px; border:1px solid #2a2a4a;
  background:#12122a; color:#aaa; font-size:0.7rem; cursor:pointer;
  transition:all 0.2s;
}
.ctrl-btn:hover { border-color:#5a5a8a; color:#ddd; }
.ctrl-btn.on { border-color:#00d4ff; color:#00d4ff; }
#lang-legend {
  padding:8px 16px; border-top:1px solid #1a1a3a; flex-shrink:0;
  font-size:0.7rem; display:none;
}
#lang-legend .lang-item { display:inline-flex; align-items:center; margin-right:10px; margin-bottom:4px; }
#lang-legend .lang-swatch { width:10px; height:10px; border-radius:50%; margin-right:4px; display:inline-block; }
#graph-container { position:fixed; left:320px; top:0; right:0; bottom:0; transition: right 0.3s ease; }
body.drawer-open #graph-container { right:400px; }
#heatmap-canvas {
  position:absolute; top:0; left:0; width:100%; height:100%;
  filter:blur(4px); pointer-events:none; z-index:0;
}
svg { width:100%; height:100%; position:relative; z-index:1; }
#tooltip {
  position:fixed; display:none; padding:8px 12px; border-radius:6px;
  background:rgba(10,10,26,0.95); border:1px solid #3a3a5a;
  font-size:0.78rem; pointer-events:none; z-index:20; max-width:300px;
  color:#ddd; line-height:1.4;
}
#search-box {
  margin:0 16px 8px; padding:6px 10px; border-radius:8px;
  border:1px solid #2a2a4a; background:#0a0a1a; color:#ddd;
  font-size:0.78rem; width:calc(100% - 32px); outline:none;
}
#search-box:focus { border-color:#5a5a8a; }
#search-box::placeholder { color:#555; }
#tour-actions { padding:2px 8px 6px; display:flex; gap:4px; flex-shrink:0; }
.tour-action-btn {
  padding:4px 9px; border-radius:10px; border:1px solid #2a2a4a;
  background:#12122a; color:#8899aa; font-size:0.68rem; cursor:pointer;
  transition:all 0.2s;
}
.tour-action-btn:hover { border-color:#5a5a8a; color:#cdd; }
.tour-action-btn.copied { border-color:#00e88f; color:#00e88f; }
#suggest-panel {
  display:none; padding:10px 16px; font-size:0.78rem; color:#bbc; line-height:1.5;
  border-bottom:1px solid #1a1a3a; overflow-y:auto; max-height:40vh;
}
#suggest-panel .sg-tour {
  padding:8px 10px; margin-bottom:6px; border-radius:8px;
  background:#0f0f28; border:1px solid #1a1a3a; cursor:pointer;
  transition:all 0.2s;
}
#suggest-panel .sg-tour:hover { border-color:#3a3a5a; background:#14142e; }
#suggest-panel .sg-tour strong { color:#dde; }
#suggest-panel .sg-tour .sg-nodes { color:#7788aa; font-size:0.72rem; margin-top:3px; }
#suggest-panel .sg-info { color:#667; font-size:0.72rem; margin-bottom:8px; }
/* ── RIGHT DRAWER (node detail panel) ──────────────────────────── */
#detail-drawer {
  position:fixed; top:0; right:-400px; width:400px; height:100vh;
  background:linear-gradient(180deg,#0d0d24 0%,#0a0a1a 100%);
  border-left:1px solid #1a1a3a; z-index:15;
  display:flex; flex-direction:column;
  transition: right 0.3s ease; overflow:hidden;
}
#detail-drawer.open { right:0; }
#detail-drawer-header {
  padding:14px 16px 10px; border-bottom:1px solid #1a1a3a;
  display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0;
}
#detail-drawer-header .detail-id {
  font-size:0.95rem; font-weight:600; color:#fff;
  word-break:break-all; flex:1; margin-right:8px;
}
#detail-close {
  width:28px; height:28px; border-radius:6px; border:1px solid #2a2a4a;
  background:#12122a; color:#888; font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0;
}
#detail-close:hover { border-color:#5a5a8a; color:#ddd; }
#detail-content {
  flex:1; overflow-y:auto; padding:0 16px 16px;
  scrollbar-width:thin; scrollbar-color:#2a2a4a transparent;
}
#detail-content::-webkit-scrollbar { width:6px; }
#detail-content::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:3px; }
.detail-meta { display:flex; gap:8px; flex-wrap:wrap; padding:8px 0 12px; font-size:0.72rem; }
.detail-badge {
  padding:3px 8px; border-radius:10px; border:1px solid #2a2a4a; background:#12122a;
}
.detail-badge.group { border-left:3px solid var(--group-color, #556); }
.detail-section { margin-bottom:14px; }
.detail-section-title {
  font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em;
  color:#556; font-weight:600; padding:8px 0 6px;
  border-bottom:1px solid #1a1a3a; margin-bottom:8px;
}
.detail-edge-group { margin-bottom:6px; line-height:1.7; }
.detail-edge-label { font-size:0.7rem; color:#7788aa; margin-right:6px; font-style:italic; }
.detail-edge-target {
  display:inline-block; padding:2px 7px; margin:2px 3px; border-radius:6px;
  background:#12122a; border:1px solid #2a2a4a;
  font-size:0.72rem; color:#aabbcc; cursor:pointer; transition:all 0.15s;
}
.detail-edge-target:hover { border-color:#5580aa; color:#ddeeff; background:#1a1a3a; }
.detail-tour {
  padding:6px 10px; margin-bottom:4px; border-radius:6px;
  background:#0f0f28; border:1px solid #1a1a3a;
  border-left:3px solid var(--tour-color, #556); font-size:0.78rem; color:#bbc;
}
.detail-source {
  padding:10px 12px; border-radius:6px; background:#08081a;
  border:1px solid #1a1a3a; font-family:'Cascadia Code','Fira Code',monospace;
  font-size:0.72rem; color:#8899aa; line-height:1.5;
  overflow-x:auto; white-space:pre-wrap; word-break:break-all;
}
.detail-hint { color:#445; font-size:0.7rem; text-align:center; padding:20px 0; font-style:italic; }
</style>
</head>
<body>
<div id="sidebar">
  <h1 id="viz-title">{{TITLE}}</h1>
  <div class="subtitle" id="viz-subtitle"></div>
  <input type="text" id="search-box" placeholder="Search symbols..." />
  <div id="search-suggestions"></div>
  <div class="section-label">Guided Tours <span class="help-toggle" id="tour-help-link" title="How to add tours">[?]</span></div>
  <div id="tour-list"></div>
  <div id="tour-actions">
    <button class="tour-action-btn" id="btn-suggest">Suggest Tours</button>
    <button class="tour-action-btn" id="btn-copy-prompt">Copy Prompt for Claude</button>
  </div>
  <div id="suggest-panel"></div>
  <div id="narrative"></div>
  <div id="lang-legend"></div>
  <div id="controls">
    <button class="ctrl-btn on" id="btn-live">Live</button>
    <button class="ctrl-btn" id="btn-cb">Colorblind</button>
    <button class="ctrl-btn" id="btn-lang" style="display:none">By Language</button>
    <button class="ctrl-btn" id="btn-heatmap">Heatmap: Off</button>
    <button class="ctrl-btn" id="btn-reset">Reset View</button>
  </div>
</div>
<div id="graph-container"><canvas id="heatmap-canvas"></canvas><svg id="graph-svg"></svg></div>
<div id="tooltip"></div>
<div id="detail-drawer">
  <div id="detail-drawer-header">
    <div class="detail-id" id="detail-title">—</div>
    <button id="detail-close">&#x2715;</button>
  </div>
  <div id="detail-content">
    <div class="detail-hint">Click a node in the graph to inspect it.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// ── DATA INJECTION ──────────────────────────────────────────────────
// {{DATA_INJECTION}} — replaced by generate_viz.py
// {{TOURS_INJECTION}} — replaced by generate_viz.py
// {{CONFIG_INJECTION}} — replaced by generate_viz.py

// ── EXPAND RAW DATA ─────────────────────────────────────────────────
const TYPE_NAMES = _raw.t || ['CALLS','IMPORTS','DEFINES','INHERITS','RAISES','DECORATES','SIGNATURE'];
const FILE_PATHS = _raw.f || [];
const nodes = _raw.n.map(n => ({
  id:n.i,
  label:n.l||(n.i.includes('.')?n.i.split('.').pop():n.i),
  group:n.g, degree:n.d||0, importance:n.p||0,
  language:n.ln||'other',
  hop_distance:n.h!=null?n.h:-1,
  x:n.x!=null?n.x:0, y:n.y!=null?n.y:0
}));
// Compact edge expansion: [srcIdx, tgtIdx, typeEnum, fileIdx?]
const edges = _raw.e.map(e => {
  const arr = Array.isArray(e) ? e : null;
  if (arr) return {source:nodes[arr[0]].id, target:nodes[arr[1]].id, type:TYPE_NAMES[arr[2]]||'CALLS', file:arr[3]!=null?FILE_PATHS[arr[3]]||'':''};
  return {source:e.s, target:e.t, type:e.y||'CALLS', file:e.f||''};
});
const hubNodes = new Set(_raw.hubs || []);
const initialFocusIds = new Set(_raw.fw || nodes.map(n=>n.id));
const isMultiLang = new Set(nodes.map(n=>n.language)).size > 1;
const smallGraph = nodes.length <= 500;

// ── HOP DISTANCE + NODE LOOKUP ─────────────────────────────────────
const nodeHopMap = {};
const nodeById = new Map();
nodes.forEach(d => { nodeHopMap[d.id] = d.hop_distance; nodeById.set(d.id, d); });

// ── ADJACENCY INDEX (for client-side BFS) ──────────────────────────
const adjIndex = new Map();
edges.forEach(e => {
  if (!adjIndex.has(e.source)) adjIndex.set(e.source, []);
  if (!adjIndex.has(e.target)) adjIndex.set(e.target, []);
  adjIndex.get(e.source).push(e.target);
  adjIndex.get(e.target).push(e.source);
});
function bfs(startId, maxHops) {
  const visited = new Map();
  visited.set(startId, 0);
  let frontier = [startId];
  for (let hop = 1; hop <= maxHops; hop++) {
    const next = [];
    for (const nid of frontier) {
      for (const neighbor of (adjIndex.get(nid) || [])) {
        if (!visited.has(neighbor)) { visited.set(neighbor, hop); next.push(neighbor); }
      }
    }
    frontier = next;
  }
  return visited;
}

// ── FOCUS WINDOW STATE ─────────────────────────────────────────────
let focusNodeId = null;
const focusWindow = new Set(smallGraph ? nodes.map(n=>n.id) : initialFocusIds);
const FOCUS_HOPS = 2;
const MAX_SVG_NODES = smallGraph ? nodes.length : Math.max(initialFocusIds.size, 500);

// ── LANGUAGE COLORS ─────────────────────────────────────────────────
const LANG_COLORS = {
  python:'#3572A5', javascript:'#F1E05A', typescript:'#3178C6',
  go:'#00ADD8', rust:'#DEA584', java:'#B07219',
  c:'#555555', cpp:'#F34B7D', ruby:'#CC342D', php:'#4F5D95', other:'#666688'
};

// ── PALETTES ────────────────────────────────────────────────────────
const PALETTE_DEFAULT = {
  gc: Object.assign({other:'#555570'}, typeof _groupColors !== 'undefined' ? _groupColors : {}),
  ec: {DEFINES:'#555580', CALLS:'#00d4ff', INHERITS:'#ff8c42', DECORATES:'#9c27b0', RAISES:'#ff4466'}
};
const PALETTE_CB = {
  gc: Object.assign({other:'#666688'}, typeof _groupColorsCB !== 'undefined' ? _groupColorsCB : {}),
  ec: {DEFINES:'#444466', CALLS:'#56B4E9', INHERITS:'#E69F00', DECORATES:'#CC79A7', RAISES:'#D55E00'}
};

let palette = PALETTE_DEFAULT;
let colorByLang = false;
let activeTourIdx = -1;
let activeStepIdx = -1;
let svgEl, g, gLinks, gNodes, gLabels, zoomBehavior;
let linkSel, nodeSel, labelSel;
let currentTransform = d3.zoomIdentity;

// ── NODE HELPERS ────────────────────────────────────────────────────
function nodeColor(d) {
  if (colorByLang) return LANG_COLORS[d.language] || LANG_COLORS.other;
  return palette.gc[d.group] || palette.gc.other || '#555570';
}
function edgeColor(d) { return palette.ec[d.type] || '#333'; }
function nodeRadius(d) {
  if (d.importance >= 30) return 10;
  if (d.importance >= 15) return 7;
  if (d.importance >= 5) return 4.5;
  return 2.5;
}

// ── SVG SETUP ───────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const W = container.clientWidth, H = container.clientHeight;
svgEl = d3.select('#graph-svg');

// Filters
const defs = svgEl.append('defs');
const blurFilter = defs.append('filter').attr('id','blur-cloud');
blurFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','1.5');
const glowFilter = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
glowFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','3').attr('result','blur');
const glowMerge = glowFilter.append('feMerge');
glowMerge.append('feMergeNode').attr('in','blur');
glowMerge.append('feMergeNode').attr('in','SourceGraphic');
const pulseFilter = defs.append('filter').attr('id','pulse-glow').attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
pulseFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','6').attr('result','blur');
const pulseMerge = pulseFilter.append('feMerge');
pulseMerge.append('feMergeNode').attr('in','blur');
pulseMerge.append('feMergeNode').attr('in','SourceGraphic');

// Single <g> container for SVG layer
g = svgEl.append('g').attr('id','graph-g');
zoomBehavior = d3.zoom().scaleExtent([0.05, 10])
  .on('zoom', e => {
    g.attr('transform', e.transform);
    currentTransform = e.transform;
    drawHeatmap(e.transform);
  });
svgEl.call(zoomBehavior);
gLinks    = g.append('g').attr('class','links');
gNodes    = g.append('g').attr('class','nodes');
gLabels   = g.append('g').attr('class','labels');

// ── CANVAS HEATMAP (fog layer + density/grid heatmap) ──────────────
const canvas = document.getElementById('heatmap-canvas');
const ctx = canvas.getContext('2d');
// Heatmap mode: 'off' | 'density' | 'grid'
let heatmapMode = 'off';

function resizeCanvas() {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawHeatmap(currentTransform); });

// Heatmap color palette: dark blue -> orange -> white
function heatColor(t) {
  // t in [0, 1]
  t = Math.min(1, Math.max(0, t));
  if (t < 0.33) {
    const s = t / 0.33;
    return `rgba(${Math.round(10+30*s)},${Math.round(10+40*s)},${Math.round(60+80*s)},${0.3+0.4*s})`;
  } else if (t < 0.66) {
    const s = (t - 0.33) / 0.33;
    return `rgba(${Math.round(40+180*s)},${Math.round(50+100*s)},${Math.round(140-80*s)},${0.7+0.15*s})`;
  } else {
    const s = (t - 0.66) / 0.34;
    return `rgba(${Math.round(220+35*s)},${Math.round(150+80*s)},${Math.round(60+140*s)},${0.85+0.1*s})`;
  }
}

function drawHeatmapDensity(transform) {
  // Gaussian kernel density estimate on downsampled canvas
  const cw = canvas.width, ch = canvas.height;
  const res = 4; // render at 1/4 resolution for performance
  const gw = Math.ceil(cw / res), gh = Math.ceil(ch / res);
  const grid = new Float32Array(gw * gh);
  const bandwidth = 30 * transform.k; // scale bandwidth with zoom
  const bw2 = bandwidth * bandwidth;

  let maxVal = 0;
  nodes.forEach(d => {
    const sx = d.x * transform.k + transform.x;
    const sy = d.y * transform.k + transform.y;
    const weight = d.importance || 1;
    const gx = Math.round(sx / res), gy = Math.round(sy / res);
    const spread = Math.ceil(bandwidth / res) + 1;
    for (let dy = -spread; dy <= spread; dy++) {
      for (let dx = -spread; dx <= spread; dx++) {
        const px = gx + dx, py = gy + dy;
        if (px < 0 || px >= gw || py < 0 || py >= gh) continue;
        const distSq = (dx * res) * (dx * res) + (dy * res) * (dy * res);
        if (distSq > bw2 * 4) continue;
        const v = weight * Math.exp(-distSq / (2 * bw2));
        grid[py * gw + px] += v;
        if (grid[py * gw + px] > maxVal) maxVal = grid[py * gw + px];
      }
    }
  });

  if (maxVal === 0) return;
  const imgData = ctx.createImageData(gw, gh);
  for (let i = 0; i < gw * gh; i++) {
    const t = grid[i] / maxVal;
    if (t < 0.01) continue;
    // Parse color from heatColor
    let r, g, b, a;
    if (t < 0.33) {
      const s = t / 0.33;
      r = 10+30*s; g = 10+40*s; b = 60+80*s; a = (0.3+0.4*s)*255;
    } else if (t < 0.66) {
      const s = (t-0.33)/0.33;
      r = 40+180*s; g = 50+100*s; b = 140-80*s; a = (0.7+0.15*s)*255;
    } else {
      const s = (t-0.66)/0.34;
      r = 220+35*s; g = 150+80*s; b = 60+140*s; a = (0.85+0.1*s)*255;
    }
    const idx = i * 4;
    imgData.data[idx] = r;
    imgData.data[idx+1] = g;
    imgData.data[idx+2] = b;
    imgData.data[idx+3] = a;
  }
  // Draw at low res then scale up
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = gw; tmpCanvas.height = gh;
  tmpCanvas.getContext('2d').putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(tmpCanvas, 0, 0, cw, ch);
}

function drawHeatmapGrid(transform) {
  const cw = canvas.width, ch = canvas.height;
  const gridSize = 40;
  const cellW = cw / gridSize, cellH = ch / gridSize;
  const cells = new Float32Array(gridSize * gridSize);
  let maxVal = 0;

  nodes.forEach(d => {
    const sx = d.x * transform.k + transform.x;
    const sy = d.y * transform.k + transform.y;
    const gx = Math.floor(sx / cellW), gy = Math.floor(sy / cellH);
    if (gx < 0 || gx >= gridSize || gy < 0 || gy >= gridSize) return;
    cells[gy * gridSize + gx] += (d.importance || 1);
    if (cells[gy * gridSize + gx] > maxVal) maxVal = cells[gy * gridSize + gx];
  });

  if (maxVal === 0) return;
  for (let gy = 0; gy < gridSize; gy++) {
    for (let gx = 0; gx < gridSize; gx++) {
      const val = cells[gy * gridSize + gx];
      if (val < 0.01) continue;
      const t = val / maxVal;
      ctx.fillStyle = heatColor(t);
      ctx.fillRect(gx * cellW, gy * cellH, cellW, cellH);
    }
  }
  // Subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= gridSize; i++) {
    ctx.beginPath(); ctx.moveTo(i * cellW, 0); ctx.lineTo(i * cellW, ch); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cellH); ctx.lineTo(cw, i * cellH); ctx.stroke();
  }
}

function drawFogDots(transform) {
  // Original fog-of-war dots for non-focus nodes
  nodes.forEach(d => {
    if (focusWindow.has(d.id)) return;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = palette.gc[d.group] || palette.gc.other || '#335577';
    ctx.beginPath();
    const r = Math.max(2, Math.sqrt(d.importance || 1));
    ctx.arc(d.x, d.y, r, 0, 2 * Math.PI);
    ctx.fill();
  });
}

function drawHeatmap(transform) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (smallGraph && heatmapMode === 'off') return;

  if (heatmapMode === 'density') {
    drawHeatmapDensity(transform);
  } else if (heatmapMode === 'grid') {
    drawHeatmapGrid(transform);
  }

  // Always draw fog dots for non-small graphs (unless density/grid covers it)
  if (!smallGraph) {
    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);
    if (heatmapMode === 'off') drawFogDots(transform);
    ctx.restore();
  }
}
canvas.style.display = (smallGraph && heatmapMode === 'off') ? 'none' : 'block';

// ── RESOLVE EDGE REFERENCES (no force simulation) ──────────────────
// Positions are pre-computed. Manually resolve edge source/target to objects.
edges.forEach(e => {
  if (typeof e.source === 'string') e.source = nodeById.get(e.source) || e.source;
  if (typeof e.target === 'string') e.target = nodeById.get(e.target) || e.target;
});

// ── FOCUS WINDOW RENDERING ─────────────────────────────────────────
// Tour node set (always visible in focus window)
const tourNodeIds = new Set();
if (tours.length) {
  tours.forEach(t => {
    (t.steps||[]).forEach(s => { if (s.node) tourNodeIds.add(s.node); });
    (t.keywords||[]).forEach(k => {
      nodes.forEach(n => { if (n.id===k || n.id.startsWith(k+'.') || n.id.startsWith(k)) tourNodeIds.add(n.id); });
    });
  });
}

function getFocusNodes() {
  return nodes.filter(d => focusWindow.has(d.id));
}
function getFocusEdges() {
  return edges.filter(e => {
    const sid = typeof e.source==='object'?e.source.id:e.source;
    const tid = typeof e.target==='object'?e.target.id:e.target;
    return focusWindow.has(sid) && focusWindow.has(tid);
  });
}

function focusHopDist(d) {
  // Hop distance from current focus node (client-side)
  if (!focusNodeId) return d.hop_distance;
  if (d.id === focusNodeId) return 0;
  if (tourNodeIds.has(d.id)) return 0;  // tour nodes always "close"
  // Use pre-computed hop_distance as fallback
  return d._focusHop != null ? d._focusHop : d.hop_distance;
}

function rebuildFocusView() {
  const fn = getFocusNodes();
  const fe = getFocusEdges();

  linkSel = gLinks.selectAll('line').data(fe, d => {
    const sid = typeof d.source==='object'?d.source.id:d.source;
    const tid = typeof d.target==='object'?d.target.id:d.target;
    return sid+'|'+tid+'|'+d.type;
  }).join(
    enter => enter.append('line')
      .attr('stroke', edgeColor)
      .attr('stroke-width', d => d.type==='CALLS'?0.8 : d.type==='INHERITS'?1.2 : 0.4)
      .attr('stroke-opacity', 0)
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y)
      .call(s => s.transition().duration(300).attr('stroke-opacity', d => {
        const fh = Math.min(focusHopDist(d.source), focusHopDist(d.target));
        return fh === 0 ? 0.5 : fh <= 1 ? 0.3 : 0.15;
      })),
    update => update.call(s => s.transition().duration(300).attr('stroke-opacity', d => {
      const fh = Math.min(focusHopDist(d.source), focusHopDist(d.target));
      return fh === 0 ? 0.5 : fh <= 1 ? 0.3 : 0.15;
    })),
    exit => exit.transition().duration(300).attr('stroke-opacity', 0).remove()
  );

  nodeSel = gNodes.selectAll('circle').data(fn, d=>d.id).join(
    enter => enter.append('circle')
      .attr('cx', d=>d.x).attr('cy', d=>d.y)
      .attr('r', d => nodeRadius(d))
      .attr('fill', nodeColor)
      .attr('stroke', '#0a0a1a').attr('stroke-width', 0.5)
      .attr('fill-opacity', 0)
      .call(d3.drag().on('start',dragStart).on('drag',dragging).on('end',dragEnd))
      .call(s => s.transition().duration(300)
        .attr('fill-opacity', d => {
          const fh = focusHopDist(d);
          return fh === 0 ? 1.0 : fh <= 1 ? 0.7 : 0.4;
        })
        .attr('filter', d => {
          const fh = focusHopDist(d);
          return fh === 0 ? 'url(#glow)' : fh <= 1 ? null : 'url(#blur-cloud)';
        })
        .attr('r', d => {
          const fh = focusHopDist(d);
          return fh === 0 ? nodeRadius(d)*1.3 : nodeRadius(d);
        })
      ),
    update => update.call(s => s.transition().duration(300)
      .attr('fill-opacity', d => {
        const fh = focusHopDist(d);
        return fh === 0 ? 1.0 : fh <= 1 ? 0.7 : 0.4;
      })
      .attr('filter', d => {
        const fh = focusHopDist(d);
        return fh === 0 ? 'url(#glow)' : fh <= 1 ? null : 'url(#blur-cloud)';
      })
      .attr('r', d => {
        const fh = focusHopDist(d);
        return fh === 0 ? nodeRadius(d)*1.3 : nodeRadius(d);
      })
    ),
    exit => exit.transition().duration(300).attr('fill-opacity', 0).remove()
  );
  setupTooltip(nodeSel);
  nodeSel.on('click', (ev, d) => { ev.stopPropagation(); openDrawer(d.id); updateFocusWindow(d.id); });

  labelSel = gLabels.selectAll('text').data(fn, d=>d.id).join(
    enter => enter.append('text')
      .text(d=>d.label)
      .attr('x', d=>d.x).attr('y', d=>d.y)
      .attr('font-size', d => { const fh=focusHopDist(d); return fh===0?'10px':fh<=1?'7px':'0px'; })
      .attr('fill', nodeColor).attr('fill-opacity', 0)
      .attr('stroke','#0a0a12').attr('stroke-width',3).attr('stroke-opacity', 0)
      .attr('paint-order','stroke')
      .attr('dx', d => nodeRadius(d)+3).attr('dy','0.35em')
      .attr('pointer-events','none')
      .call(s => s.transition().duration(300)
        .attr('fill-opacity', d => { const fh=focusHopDist(d); return fh===0?1:fh<=1?0.5:0.2; })
        .attr('stroke-opacity', d => { const fh=focusHopDist(d); return fh===0?1:fh<=1?0.5:0.2; })
      ),
    update => update,
    exit => exit.transition().duration(300).attr('fill-opacity',0).attr('stroke-opacity',0).remove()
  );

  drawHeatmap(currentTransform);
}

function updateFocusWindow(newFocusId) {
  focusNodeId = newFocusId;
  if (!newFocusId || smallGraph) { rebuildFocusView(); return; }

  // BFS from focus node
  const neighborhood = bfs(newFocusId, FOCUS_HOPS);

  // Assign focus hop distances to nodes
  nodes.forEach(d => { d._focusHop = neighborhood.get(d.id) ?? null; });

  // Merge: neighborhood + tour nodes, capped at MAX_SVG_NODES
  const candidates = new Set([...neighborhood.keys(), ...tourNodeIds]);
  // If over budget, trim by priority
  if (candidates.size > MAX_SVG_NODES) {
    const sorted = [...candidates].map(id => ({
      id, hop: neighborhood.get(id) ?? 999,
      isTour: tourNodeIds.has(id),
      imp: nodeById.get(id)?.importance || 0
    })).sort((a,b) => {
      // Focus node first, then by hop, then tour nodes, then importance
      if (a.id === newFocusId) return -1;
      if (b.id === newFocusId) return 1;
      if (a.hop !== b.hop) return a.hop - b.hop;
      if (a.isTour !== b.isTour) return a.isTour ? -1 : 1;
      return b.imp - a.imp;
    });
    candidates.clear();
    sorted.slice(0, MAX_SVG_NODES).forEach(x => candidates.add(x.id));
  }

  focusWindow.clear();
  candidates.forEach(id => focusWindow.add(id));

  rebuildFocusView();
}

// ── INITIAL RENDER ─────────────────────────────────────────────────
rebuildFocusView();

// ── TOOLTIP ─────────────────────────────────────────────────────────
const tooltip = d3.select('#tooltip');
function setupTooltip(sel) {
  sel.on('mouseover', (ev,d) => {
    const langTag = d.language && d.language !== 'other' ? ` [${d.language}]` : '';
    const hopTag = d.hop_distance >= 0 ? ` · Hop: ${d.hop_distance}` : '';
    tooltip.style('display','block')
      .html(`<strong>${d.id}</strong>${langTag}<br>Group: ${d.group}<br>Degree: ${d.degree} · Importance: ${d.importance}${hopTag}`);
  }).on('mousemove', ev => {
    tooltip.style('left',(ev.clientX+12)+'px').style('top',(ev.clientY-10)+'px');
  }).on('mouseout', () => tooltip.style('display','none'));
}

// ── DRAG (manual repositioning, no simulation) ─────────────────────
function dragStart(ev,d) { d._dragOx = d.x; d._dragOy = d.y; }
function dragging(ev,d) { d.x = ev.x; d.y = ev.y; rebuildFocusView(); }
function dragEnd(ev,d) { /* position stays where dropped */ }

// ── LABEL OPACITY HELPER ────────────────────────────────────────────
function setLabelOpacity(sel, dur, opFn) {
  sel.transition().duration(dur)
    .attr('fill', nodeColor)
    .attr('fill-opacity', opFn)
    .attr('stroke-opacity', opFn);
}

// ── TOUR SYSTEM ─────────────────────────────────────────────────────
function isTourNode(d, tour) {
  return tour.keywords.some(k => d.id===k || d.id.startsWith(k+'.') || d.id.startsWith(k));
}

function getConnectedNodes(tourNodeIds) {
  const connected = new Set();
  edges.forEach(e => {
    const sid = typeof e.source==='object'?e.source.id:e.source;
    const tid = typeof e.target==='object'?e.target.id:e.target;
    if (e.type!=='DEFINES') {
      if (tourNodeIds.has(sid)) connected.add(tid);
      if (tourNodeIds.has(tid)) connected.add(sid);
    }
  });
  return connected;
}

function activateTour(idx) {
  activeTourIdx = idx;
  activeStepIdx = -1;
  document.querySelectorAll('.tour-btn').forEach((b,i) => {
    b.classList.toggle('active', i===idx);
    if(i===idx) b.style.setProperty('--tour-color', tours[i].color||'#00d4ff');
  });

  if (idx < 0 || idx >= tours.length) { resetView(); return; }
  const tour = tours[idx];
  const tourColor = tour.color || '#00d4ff';

  // Render narrative
  const narDiv = document.getElementById('narrative');
  narDiv.innerHTML = '';
  narDiv.style.setProperty('--tour-color', tourColor);
  tour.steps.forEach((s,si) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = s.text;
    div.querySelectorAll('.tc').forEach(el => el.style.color = tourColor);
    div.onclick = () => spotlightStep(si);
    narDiv.appendChild(div);
  });

  // Build focus window from tour nodes + their neighborhoods
  const thisTourNodes = new Set();
  nodes.forEach(d => { if(isTourNode(d,tour)) thisTourNodes.add(d.id); });
  const connected = getConnectedNodes(thisTourNodes);

  // Set focus window to tour nodes + 1-hop connected
  focusWindow.clear();
  thisTourNodes.forEach(id => focusWindow.add(id));
  connected.forEach(id => focusWindow.add(id));

  // Set focus hop distances for tour display
  nodes.forEach(d => {
    if (thisTourNodes.has(d.id)) d._focusHop = 0;
    else if (connected.has(d.id)) d._focusHop = 1;
    else d._focusHop = 99;
  });

  rebuildFocusView();

  // Tour-specific styling on top of focus view
  nodeSel.transition().duration(600)
    .attr('fill', nodeColor)
    .attr('fill-opacity', d => thisTourNodes.has(d.id)?1 : connected.has(d.id)?0.3 : 0.04)
    .attr('filter', d => thisTourNodes.has(d.id)?'url(#glow)':null)
    .attr('r', d => thisTourNodes.has(d.id)?nodeRadius(d)*1.3:nodeRadius(d));

  setLabelOpacity(labelSel, 600, d =>
    thisTourNodes.has(d.id)?1 : connected.has(d.id)?0.2 : 0
  );
  labelSel.transition().duration(600)
    .attr('font-size', d => thisTourNodes.has(d.id)?'10px' : connected.has(d.id)?'6px':'0px');

  linkSel.transition().duration(600)
    .attr('stroke-opacity', d => {
      const sid = typeof d.source==='object'?d.source.id:d.source;
      const tid = typeof d.target==='object'?d.target.id:d.target;
      if(thisTourNodes.has(sid)&&thisTourNodes.has(tid)) return 0.7;
      if(thisTourNodes.has(sid)||thisTourNodes.has(tid)) return 0.15;
      return 0.01;
    });

  // Zoom to fit tour nodes
  zoomToNodes([...thisTourNodes]);
}

function spotlightStep(si) {
  activeStepIdx = si;
  document.querySelectorAll('.step').forEach((s,i) => s.classList.toggle('active',i===si));
  const tour = tours[activeTourIdx];
  const step = tour.steps[si];
  if (!step || !step.node) return;

  const target = nodes.find(n => n.id === step.node);
  if (!target) return;

  // Shift focus to this tour step
  updateFocusWindow(step.node);
  openDrawer(step.node);

  const tourNodeIds = new Set();
  nodes.forEach(d => { if(isTourNode(d,tour)) tourNodeIds.add(d.id); });

  // Zoom to target
  const scale = 0.8;
  svgEl.transition().duration(800).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2-(target.x*scale), H/2-(target.y*scale)).scale(scale)
  );

  // Spotlight: enlarge target, dim everything else
  nodeSel.transition().duration(500)
    .attr('r', d => d.id===target.id ? nodeRadius(d)*2.5 : nodeRadius(d))
    .attr('fill-opacity', d => d.id===target.id?1 : tourNodeIds.has(d.id)?0.12 : 0.01)
    .attr('filter', d => d.id===target.id?'url(#pulse-glow)' : null);

  setLabelOpacity(labelSel, 500, d =>
    d.id===target.id?1 : tourNodeIds.has(d.id)?0.08 : 0
  );

  linkSel.transition().duration(500)
    .attr('stroke-opacity', d => {
      const sid = typeof d.source==='object'?d.source.id:d.source;
      const tid = typeof d.target==='object'?d.target.id:d.target;
      if(sid===target.id||tid===target.id) return 0.8;
      return 0.01;
    });

  // Pulse ring
  const ring = gNodes.append('circle')
    .attr('cx',target.x).attr('cy',target.y)
    .attr('r', nodeRadius(target)*2.5)
    .attr('fill','none')
    .attr('stroke', tour.color||'#00d4ff')
    .attr('stroke-width',3)
    .attr('stroke-opacity',0.9)
    .attr('filter','url(#pulse-glow)');

  function pulse(i) {
    if(i>=3) {
      ring.remove();
      const settleScale = 0.8;
      svgEl.transition().duration(600).call(
        zoomBehavior.transform,
        d3.zoomIdentity.translate(W/2-(target.x*settleScale), H/2-(target.y*settleScale)).scale(settleScale)
      );
      const allTourNodes = new Set();
      nodes.forEach(d => { if(isTourNode(d,tours[activeTourIdx])) allTourNodes.add(d.id); });
      nodeSel.transition().duration(600)
        .attr('r', d => d.id===target.id ? nodeRadius(d)*2.2 : allTourNodes.has(d.id)?nodeRadius(d)*1.1:nodeRadius(d))
        .attr('fill-opacity', d => d.id===target.id?1 : allTourNodes.has(d.id)?0.6 : focusWindow.has(d.id)?0.2 : 0.04)
        .attr('filter', d => d.id===target.id?'url(#pulse-glow)' : allTourNodes.has(d.id)?'url(#glow)':null);
      setLabelOpacity(labelSel, 600, d =>
        d.id===target.id?1 : allTourNodes.has(d.id)?0.4 : 0
      );
      linkSel.transition().duration(600)
        .attr('stroke-opacity', d => {
          const sid = typeof d.source==='object'?d.source.id:d.source;
          const tid = typeof d.target==='object'?d.target.id:d.target;
          if(sid===target.id||tid===target.id) return 0.6;
          if(allTourNodes.has(sid)&&allTourNodes.has(tid)) return 0.3;
          return 0.02;
        });
      return;
    }
    ring.transition().duration(500)
      .attr('r', nodeRadius(target)*3.5).attr('stroke-opacity',0)
      .transition().duration(300)
      .attr('r', nodeRadius(target)*2.5).attr('stroke-opacity',0.8)
      .on('end', ()=>pulse(i+1));
  }
  pulse(0);
}

function zoomToNodes(nodeIds) {
  const pts = nodes.filter(n => nodeIds.includes(n.id));
  if (!pts.length) return;
  const xs = pts.map(n=>n.x), ys = pts.map(n=>n.y);
  const x0=Math.min(...xs)-60, x1=Math.max(...xs)+60, y0=Math.min(...ys)-60, y1=Math.max(...ys)+60;
  const bw=x1-x0, bh=y1-y0;
  const scale = Math.min(W/bw, H/bh, 2) * 0.85;
  const cx = (x0+x1)/2, cy = (y0+y1)/2;
  svgEl.transition().duration(800).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2-cx*scale, H/2-cy*scale).scale(scale)
  );
}

function resetView() {
  activeTourIdx = -1;
  activeStepIdx = -1;
  focusNodeId = null;
  document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('narrative').innerHTML = '<div style="color:#666;font-size:0.8rem;padding:20px 0;">Select a tour to explore the codebase architecture.<br><small>Click any node to explore its neighborhood.</small></div>';

  // Restore initial focus window
  focusWindow.clear();
  (smallGraph ? nodes.map(n=>n.id) : [...initialFocusIds]).forEach(id => focusWindow.add(id));
  nodes.forEach(d => { d._focusHop = null; });
  rebuildFocusView();

  svgEl.transition().duration(800).call(
    zoomBehavior.transform, d3.zoomIdentity.translate(0,0).scale(1)
  );
}

// ── SEARCH ──────────────────────────────────────────────────────────
const searchBox = document.getElementById('search-box');
searchBox.addEventListener('keydown', (ev) => {
  if (ev.key !== 'Enter') return;
  const q = searchBox.value.trim().toLowerCase();
  if (!q) { if(activeTourIdx>=0) activateTour(activeTourIdx); else resetView(); return; }
  const matches = new Set();
  nodes.forEach(d => { if(d.id.toLowerCase().includes(q)||d.label.toLowerCase().includes(q)) matches.add(d.id); });
  const connected = getConnectedNodes(matches);

  // Expand focus window to include matches + their neighbors
  if (!smallGraph && matches.size > 0) {
    focusWindow.clear();
    matches.forEach(id => focusWindow.add(id));
    connected.forEach(id => focusWindow.add(id));
    tourNodeIds.forEach(id => focusWindow.add(id));
    // Assign focus hops for search
    nodes.forEach(d => {
      if (matches.has(d.id)) d._focusHop = 0;
      else if (connected.has(d.id)) d._focusHop = 1;
      else d._focusHop = 99;
    });
    rebuildFocusView();
  }

  nodeSel.transition().duration(400)
    .attr('fill-opacity', d => matches.has(d.id)?1 : connected.has(d.id)?0.2 : 0.03)
    .attr('r', d => matches.has(d.id)?nodeRadius(d)*1.5:nodeRadius(d))
    .attr('filter', d => matches.has(d.id)?'url(#glow)':null);

  setLabelOpacity(labelSel, 400, d => matches.has(d.id)?1 : 0);
  labelSel.transition().duration(400)
    .attr('font-size', d => matches.has(d.id)?'10px':'0px');

  linkSel.transition().duration(400)
    .attr('stroke-opacity', d => {
      const sid=typeof d.source==='object'?d.source.id:d.source;
      const tid=typeof d.target==='object'?d.target.id:d.target;
      if(matches.has(sid)||matches.has(tid)) return 0.5;
      return 0.01;
    });

  if(matches.size>0 && matches.size<=30) zoomToNodes([...matches]);
});

// ── DETAIL DRAWER ───────────────────────────────────────────────────
const TYPE_LABELS = {
  CALLS:     {out:'calls \u2192', in:'\u2190 called by'},
  IMPORTS:   {out:'imports \u2192', in:'\u2190 imported by'},
  DEFINES:   {out:'defines \u2192', in:'\u2190 defined in'},
  INHERITS:  {out:'inherits from \u2192', in:'\u2190 inherited by'},
  SIGNATURE: {out:'has param \u2192', in:'\u2190 param of'},
  RAISES:    {out:'raises \u2192', in:'\u2190 raised by'},
  DECORATES: {out:'decorates \u2192', in:'\u2190 decorated by'},
};

function buildDetailIndex() {
  const idx = {};
  nodes.forEach(n => {
    idx[n.id] = { node: n, outgoing: {}, incoming: {}, tours: [], files: new Set() };
  });
  edges.forEach(e => {
    const sid = typeof e.source==='object' ? e.source.id : e.source;
    const tid = typeof e.target==='object' ? e.target.id : e.target;
    if (idx[sid]) {
      if (!idx[sid].outgoing[e.type]) idx[sid].outgoing[e.type] = [];
      idx[sid].outgoing[e.type].push({id:tid, file:e.file});
      if (e.file) idx[sid].files.add(e.file);
    }
    if (idx[tid]) {
      if (!idx[tid].incoming[e.type]) idx[tid].incoming[e.type] = [];
      idx[tid].incoming[e.type].push({id:sid, file:e.file});
      if (e.file) idx[tid].files.add(e.file);
    }
  });
  tours.forEach(t => {
    const kws = t.keywords || [];
    nodes.forEach(n => {
      if (kws.some(k => n.id===k || n.id.startsWith(k+'.') || n.id.endsWith('.'+k))) {
        idx[n.id].tours.push({ name:t.name, color:t.color });
      }
    });
  });
  Object.values(idx).forEach(d => {
    const seen = new Set();
    d.tours = d.tours.filter(t => seen.has(t.name) ? false : (seen.add(t.name), true));
  });
  return idx;
}
const detailIndex = buildDetailIndex();

function renderDetail(nodeId) {
  const d = detailIndex[nodeId];
  if (!d) return '';
  const n = d.node;
  const gc = palette.gc[n.group] || palette.gc.other || '#555570';

  document.getElementById('detail-title').textContent = n.id;

  let html = '';
  html += '<div class="detail-meta">';
  html += `<span class="detail-badge group" style="--group-color:${gc}">${n.group}</span>`;
  html += `<span class="detail-badge">importance ${n.importance}</span>`;
  html += `<span class="detail-badge">degree ${n.degree}</span>`;
  const files = [...d.files];
  if (files.length) html += `<span class="detail-badge">${files[0]}</span>`;
  html += '</div>';

  const allTypes = new Set([...Object.keys(d.outgoing), ...Object.keys(d.incoming)]);
  if (allTypes.size) {
    html += '<div class="detail-section"><div class="detail-section-title">Connections</div>';
    for (const type of ['CALLS','IMPORTS','DEFINES','INHERITS','SIGNATURE','RAISES','DECORATES']) {
      if (!allTypes.has(type)) continue;
      const labels = TYPE_LABELS[type] || {out:type+' \u2192', in:'\u2190 '+type};
      const out = d.outgoing[type] || [];
      const inc = d.incoming[type] || [];
      if (out.length) {
        html += `<div class="detail-edge-group"><span class="detail-edge-label">${labels.out}</span>`;
        out.slice(0,15).forEach(e => {
          const lbl = e.id.includes('.') ? e.id.split('.').pop() : e.id;
          html += `<span class="detail-edge-target" data-node="${e.id}" title="${e.id}">${lbl}</span>`;
        });
        if (out.length > 15) html += `<span class="detail-edge-label">+${out.length-15} more</span>`;
        html += '</div>';
      }
      if (inc.length) {
        html += `<div class="detail-edge-group"><span class="detail-edge-label">${labels.in}</span>`;
        inc.slice(0,15).forEach(e => {
          const lbl = e.id.includes('.') ? e.id.split('.').pop() : e.id;
          html += `<span class="detail-edge-target" data-node="${e.id}" title="${e.id}">${lbl}</span>`;
        });
        if (inc.length > 15) html += `<span class="detail-edge-label">+${inc.length-15} more</span>`;
        html += '</div>';
      }
    }
    html += '</div>';
  }

  if (d.tours.length) {
    html += '<div class="detail-section"><div class="detail-section-title">Referenced in Tours</div>';
    d.tours.forEach(t => {
      html += `<div class="detail-tour" style="--tour-color:${t.color}">${t.name}</div>`;
    });
    html += '</div>';
  }

  html += '<div class="detail-section"><div class="detail-section-title">Source</div>';
  html += '<pre class="detail-source">';
  html += `# File: ${files[0] || '(unknown)'}\n\n`;
  if (d.outgoing.DEFINES) {
    html += `# ${n.id} defines:\n`;
    d.outgoing.DEFINES.slice(0,8).forEach(e => { html += `#   ${e.id}\n`; });
  }
  if (d.outgoing.CALLS) {
    html += `# ${n.id} calls:\n`;
    d.outgoing.CALLS.slice(0,8).forEach(e => { html += `#   ${e.id}\n`; });
  }
  if (d.incoming.CALLS) {
    html += `# Called by:\n`;
    d.incoming.CALLS.slice(0,8).forEach(e => { html += `#   ${e.id}\n`; });
  }
  html += '</pre></div>';

  return html;
}

const detailDrawer = document.getElementById('detail-drawer');
const detailContent = document.getElementById('detail-content');
let activeDetailNode = null;

function openDrawer(nodeId) {
  activeDetailNode = nodeId;
  detailContent.innerHTML = renderDetail(nodeId);
  detailDrawer.classList.add('open');
  document.body.classList.add('drawer-open');
  detailContent.querySelectorAll('.detail-edge-target').forEach(el => {
    el.addEventListener('click', () => {
      const targetId = el.dataset.node;
      if (detailIndex[targetId]) { updateFocusWindow(targetId); openDrawer(targetId); }
    });
  });
}
function closeDrawer() {
  activeDetailNode = null;
  detailDrawer.classList.remove('open');
  document.body.classList.remove('drawer-open');
}

document.getElementById('detail-close').onclick = closeDrawer;

svgEl.on('click', () => {
  if (activeDetailNode) closeDrawer();
});

// ── KEYBOARD NAV ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target === searchBox) return;
  if (e.key === 'Escape') {
    if (activeDetailNode) closeDrawer();
    else resetView();
    return;
  }
  if (e.key==='ArrowRight'||e.key==='ArrowDown') {
    e.preventDefault();
    if (activeTourIdx>=0 && activeStepIdx < tours[activeTourIdx].steps.length-1) spotlightStep(activeStepIdx+1);
    else if (activeTourIdx<0 && tours.length) activateTour(0);
  }
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') {
    e.preventDefault();
    if (activeStepIdx>0) spotlightStep(activeStepIdx-1);
  }
});

document.getElementById('tour-help-link').onclick = function() {

      2. Re-run the generator:<br>

      Use <code style="color:#7788aa;">hce overview</code> and <code style="color:#7788aa;">hce search</code> to discover symbols worth touring. The search box above also helps &mdash; try typing a module name to find clusters.

};

// ── TOUR SUGGESTION ENGINE ──────────────────────────────────────────
function discoverClusters() {
  // Group nodes by their top-level module prefix
  const groups = {};
  nodes.forEach(n => {
    const g = n.group || 'other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(n);
  });

  // Score each group: sum of importance, count of inter-group edges
  const suggestions = [];
  for (const [groupName, groupNodes] of Object.entries(groups)) {
    if (groupName === 'other' || groupNodes.length < 2) continue;
    const nodeIds = new Set(groupNodes.map(n => n.id));
    const totalImportance = groupNodes.reduce((s, n) => s + n.importance, 0);
    const internalEdges = edges.filter(e => {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      return nodeIds.has(sid) && nodeIds.has(tid) && e.type !== 'DEFINES';
    }).length;
    const topSymbols = [...groupNodes].sort((a, b) => b.importance - a.importance).slice(0, 5);
    suggestions.push({
      name: groupName.charAt(0).toUpperCase() + groupName.slice(1),
      score: totalImportance + internalEdges * 2,
      nodeCount: groupNodes.length,
      edgeCount: internalEdges,
      topSymbols,
      keywords: [groupName + '.'],
      type: 'module'
    });
  }

  // Cross-language tour (if multi-lang)
  if (isMultiLang) {
    const crossEdges = edges.filter(e => {
      const sn = nodes.find(n => n.id === (typeof e.source === 'object' ? e.source.id : e.source));
      const tn = nodes.find(n => n.id === (typeof e.target === 'object' ? e.target.id : e.target));
      return sn && tn && sn.language !== tn.language && e.type !== 'DEFINES';
    });
    if (crossEdges.length > 0) {
      const crossNodes = new Set();
      crossEdges.forEach(e => {
        crossNodes.add(typeof e.source === 'object' ? e.source.id : e.source);
        crossNodes.add(typeof e.target === 'object' ? e.target.id : e.target);
      });
      const topCross = [...crossNodes].map(id => nodes.find(n => n.id === id)).filter(Boolean)
        .sort((a, b) => b.importance - a.importance).slice(0, 5);
      suggestions.push({
        name: 'Cross-Language Boundaries',
        score: crossEdges.length * 5,
        nodeCount: crossNodes.size,
        edgeCount: crossEdges.length,
        topSymbols: topCross,
        keywords: [...crossNodes].slice(0, 10),
        type: 'cross-language'
      });
    }
  }

  // "Most Important" suggestion if not already a tour
  const hasImportantTour = tours.some(t => t.name.toLowerCase().includes('important'));
  if (!hasImportantTour) {
    const topAll = [...nodes].sort((a, b) => b.importance - a.importance).slice(0, 15);
    suggestions.unshift({
      name: 'Most Important Symbols',
      score: 99999,
      nodeCount: topAll.length,
      edgeCount: 0,
      topSymbols: topAll.slice(0, 5),
      keywords: topAll.map(n => n.id),
      type: 'importance'
    });
  }

  return suggestions.sort((a, b) => b.score - a.score);
}

const suggestPanel = document.getElementById('suggest-panel');
let suggestVisible = false;

document.getElementById('btn-suggest').onclick = function() {
  suggestVisible = !suggestVisible;
  if (!suggestVisible) { suggestPanel.style.display = 'none'; return; }

  const suggestions = discoverClusters();
  // Filter out groups that already have tours
  const existingKeywords = new Set();
  tours.forEach(t => t.keywords.forEach(k => existingKeywords.add(k)));

  const novel = suggestions.filter(s =>
    !s.keywords.every(k => existingKeywords.has(k))
  );

  suggestPanel.style.display = 'block';
  if (!novel.length) {
    suggestPanel.innerHTML = '<div class="sg-info">All major clusters already have tours. Nice coverage!</div>';
    return;
  }

  suggestPanel.innerHTML = '<div class="sg-info">Click a suggestion to preview it on the graph:</div>' +
    novel.slice(0, 8).map((s, i) => `
      <div class="sg-tour" data-idx="${i}">
        <strong>${s.name}</strong>
        <span style="color:#556;font-size:0.7rem;"> &mdash; ${s.nodeCount} symbols, ${s.edgeCount} connections</span>
        <div class="sg-nodes">Top: ${s.topSymbols.map(n => n.label).join(', ')}</div>
      </div>
    `).join('');

  const novelRef = novel; // closure reference
  suggestPanel.querySelectorAll('.sg-tour').forEach(el => {
    el.onclick = () => {
      const s = novelRef[+el.dataset.idx];
      // Preview: highlight these nodes on the graph
      const ids = new Set(s.type === 'importance' ? s.keywords : []);
      if (s.type !== 'importance') {
        nodes.forEach(n => { if (s.keywords.some(k => n.id === k || n.id.startsWith(k))) ids.add(n.id); });
      }
      const connected = getConnectedNodes(ids);

      // Expand focus window to include suggestion nodes
      if (!smallGraph && ids.size > 0) {
        focusWindow.clear();
        ids.forEach(id => focusWindow.add(id));
        connected.forEach(id => focusWindow.add(id));
        tourNodeIds.forEach(id => focusWindow.add(id));
        nodes.forEach(d => {
          if (ids.has(d.id)) d._focusHop = 0;
          else if (connected.has(d.id)) d._focusHop = 1;
          else d._focusHop = 99;
        });
        rebuildFocusView();
      }

      nodeSel.transition().duration(500)
        .attr('fill-opacity', d => ids.has(d.id) ? 1 : connected.has(d.id) ? 0.2 : 0.03)
        .attr('r', d => ids.has(d.id) ? nodeRadius(d) * 1.3 : nodeRadius(d))
        .attr('filter', d => ids.has(d.id) ? 'url(#glow)' : null);
      setLabelOpacity(labelSel, 500, d => ids.has(d.id) ? 1 : 0);
      labelSel.transition().duration(500)
        .attr('font-size', d => ids.has(d.id) ? '10px' : '0px');
      linkSel.transition().duration(500)
        .attr('stroke-opacity', d => {
          const sid = typeof d.source === 'object' ? d.source.id : d.source;
          const tid = typeof d.target === 'object' ? d.target.id : d.target;
          if (ids.has(sid) || ids.has(tid)) return 0.5;
          return 0.01;
        });
      if (ids.size > 0 && ids.size <= 50) zoomToNodes([...ids]);
    };
  });
};

// ── COPY PROMPT FOR CLAUDE ─────────────────────────────────────────
document.getElementById('btn-copy-prompt').onclick = function() {
  const btn = this;

  // Gather graph context
  const topByImportance = [...nodes].sort((a, b) => b.importance - a.importance).slice(0, 25);
  const groupSummary = {};
  nodes.forEach(n => {
    if (!groupSummary[n.group]) groupSummary[n.group] = { count: 0, topImportance: 0 };
    groupSummary[n.group].count++;
    groupSummary[n.group].topImportance = Math.max(groupSummary[n.group].topImportance, n.importance);
  });
  const groupLines = Object.entries(groupSummary)
    .sort((a, b) => b[1].topImportance - a[1].topImportance)
    .map(([g, v]) => `  - ${g}: ${v.count} symbols (peak importance ${v.topImportance})`).join('\n');
  const topLines = topByImportance.map(n =>
    `  - ${n.id} (group: ${n.group}, importance: ${n.importance}, lang: ${n.language})`
  ).join('\n');

  const existingTourNames = tours.map(t => t.name).join(', ') || '(none yet)';

  const langInfo = isMultiLang
    ? `Languages: ${Object.entries(langCounts).sort((a,b)=>b[1]-a[1]).map(([l,c])=>`${l} (${c})`).join(', ')}\n`
    : '';

  const prompt = `I have an HCE (Hypergraph Code Explorer) visualization of a codebase with ${nodes.length} symbols and ${edges.length} edges.
${langInfo}
Groups in the graph:
${groupLines}

Top 25 symbols by importance:
${topLines}

Existing tours: ${existingTourNames}

Please suggest 3-5 new guided tours for this codebase. For each tour, provide:
- name: A short descriptive title
- color: A hex color that looks good on a dark (#0a0a1a) background
- keywords: Array of node ID prefixes that belong to this tour
- steps: 4-6 narrative steps, each with "text" (HTML with <strong class='tc'>symbol</strong> tags) and "node" (the target node ID)

Format the output as a JSON object I can merge into my tours.json file:
{
  "tours": [
    {
      "name": "Tour Name",
      "color": "#hex",
      "keywords": ["prefix1", "prefix2"],
      "steps": [{"text": "...", "node": "symbol.id"}, ...]
    }
  ]
}

Focus on architectural patterns, data flow, and subsystems not already covered by the existing tours. Each narrative step should explain why the symbol matters and what would break without it.`;

  navigator.clipboard.writeText(prompt).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt for Claude'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback for non-HTTPS contexts
    const ta = document.createElement('textarea');
    ta.value = prompt; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt for Claude'; btn.classList.remove('copied'); }, 2000);
  });
};

// ── INIT ────────────────────────────────────────────────────────────
// On load: focus on first tour step (or hub node if no tours)
if (tours.length > 0) {
  activateTour(0);
} else if (!smallGraph) {
  // Focus on highest-importance hub node
  const hub = [...nodes].sort((a,b) => b.importance - a.importance)[0];
  if (hub) updateFocusWindow(hub.id);
  else resetView();
} else {
  resetView();
}
