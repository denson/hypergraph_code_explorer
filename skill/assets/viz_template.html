<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e8; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; overflow:hidden; }
#sidebar {
  position:fixed; left:0; top:0; width:320px; height:100vh;
  background:linear-gradient(180deg,#0d0d24 0%,#0a0a1a 100%);
  border-right:1px solid #1a1a3a; z-index:10; display:flex; flex-direction:column;
  overflow:hidden;
}
#sidebar h1 { font-size:1.1rem; padding:16px 16px 4px; color:#fff; font-weight:600; }
#sidebar .subtitle { font-size:0.75rem; padding:0 16px 12px; color:#888; }
.section-label {
  font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em;
  color:#556; padding:4px 16px 2px; font-weight:600;
}
.section-label .help-toggle { color:#5580aa; cursor:pointer; font-weight:400; text-transform:none; letter-spacing:0; }
.section-label .help-toggle:hover { color:#88aacc; text-decoration:underline; }
#tour-list { padding:4px 8px 8px; flex-shrink:0; display:flex; flex-wrap:wrap; gap:4px; }
#search-suggestions {
  display:none; padding:0 16px 6px; font-size:0.7rem; color:#556;
}
#search-suggestions span {
  color:#7788aa; cursor:pointer; margin-right:8px; transition:color 0.15s;
}
#search-suggestions span:hover { color:#aaccee; }
.tour-btn {
  padding:5px 10px; border-radius:12px; border:1px solid #2a2a4a;
  background:#12122a; color:#aaa; font-size:0.72rem; cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.tour-btn:hover { border-color:#5a5a8a; color:#ddd; }
.tour-btn.active { border-color:var(--tour-color,#00d4ff); color:#fff; background:#1a1a3a; }
#narrative {
  flex:1; overflow-y:auto; padding:12px 16px;
  scrollbar-width:thin; scrollbar-color:#2a2a4a transparent;
}
#narrative::-webkit-scrollbar { width:6px; }
#narrative::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:3px; }
.step {
  padding:10px 12px; margin-bottom:8px; border-radius:8px;
  background:#0f0f28; border:1px solid #1a1a3a; cursor:pointer;
  font-size:0.82rem; line-height:1.5; transition:all 0.2s; color:#ccc;
}
.step:hover { border-color:#3a3a5a; background:#14142e; }
.step.active { border-color:var(--tour-color,#00d4ff); background:#1a1a34; }
.step .tc { font-weight:600; }
#controls {
  padding:10px 16px; border-top:1px solid #1a1a3a;
  display:flex; gap:6px; flex-wrap:wrap; flex-shrink:0;
}
.ctrl-btn {
  padding:4px 10px; border-radius:10px; border:1px solid #2a2a4a;
  background:#12122a; color:#aaa; font-size:0.7rem; cursor:pointer;
  transition:all 0.2s;
}
.ctrl-btn:hover { border-color:#5a5a8a; color:#ddd; }
.ctrl-btn.on { border-color:#00d4ff; color:#00d4ff; }
#lang-legend {
  padding:8px 16px; border-top:1px solid #1a1a3a; flex-shrink:0;
  font-size:0.7rem; display:none;
}
#lang-legend .lang-item { display:inline-flex; align-items:center; margin-right:10px; margin-bottom:4px; }
#lang-legend .lang-swatch { width:10px; height:10px; border-radius:50%; margin-right:4px; display:inline-block; }
#graph-container { position:fixed; left:320px; top:0; right:0; bottom:0; }
svg { width:100%; height:100%; }
#tooltip {
  position:fixed; display:none; padding:8px 12px; border-radius:6px;
  background:rgba(10,10,26,0.95); border:1px solid #3a3a5a;
  font-size:0.78rem; pointer-events:none; z-index:20; max-width:300px;
  color:#ddd; line-height:1.4;
}
#search-box {
  margin:0 16px 8px; padding:6px 10px; border-radius:8px;
  border:1px solid #2a2a4a; background:#0a0a1a; color:#ddd;
  font-size:0.78rem; width:calc(100% - 32px); outline:none;
}
#search-box:focus { border-color:#5a5a8a; }
#search-box::placeholder { color:#555; }
#tour-actions { padding:2px 8px 6px; display:flex; gap:4px; flex-shrink:0; }
.tour-action-btn {
  padding:4px 9px; border-radius:10px; border:1px solid #2a2a4a;
  background:#12122a; color:#8899aa; font-size:0.68rem; cursor:pointer;
  transition:all 0.2s;
}
.tour-action-btn:hover { border-color:#5a5a8a; color:#cdd; }
.tour-action-btn.copied { border-color:#00e88f; color:#00e88f; }
#suggest-panel {
  display:none; padding:10px 16px; font-size:0.78rem; color:#bbc; line-height:1.5;
  border-bottom:1px solid #1a1a3a; overflow-y:auto; max-height:40vh;
}
#suggest-panel .sg-tour {
  padding:8px 10px; margin-bottom:6px; border-radius:8px;
  background:#0f0f28; border:1px solid #1a1a3a; cursor:pointer;
  transition:all 0.2s;
}
#suggest-panel .sg-tour:hover { border-color:#3a3a5a; background:#14142e; }
#suggest-panel .sg-tour strong { color:#dde; }
#suggest-panel .sg-tour .sg-nodes { color:#7788aa; font-size:0.72rem; margin-top:3px; }
#suggest-panel .sg-info { color:#667; font-size:0.72rem; margin-bottom:8px; }
</style>
</head>
<body>
<div id="sidebar">
  <h1 id="viz-title">{{TITLE}}</h1>
  <div class="subtitle" id="viz-subtitle"></div>
  <input type="text" id="search-box" placeholder="Search symbols..." />
  <div id="search-suggestions"></div>
  <div class="section-label">Guided Tours <span class="help-toggle" id="tour-help-link" title="How to add tours">[?]</span></div>
  <div id="tour-list"></div>
  <div id="tour-actions">
    <button class="tour-action-btn" id="btn-suggest">Suggest Tours</button>
    <button class="tour-action-btn" id="btn-copy-prompt">Copy Prompt for Claude</button>
  </div>
  <div id="suggest-panel"></div>
  <div id="narrative"></div>
  <div id="lang-legend"></div>
  <div id="controls">
    <button class="ctrl-btn on" id="btn-live">Live</button>
    <button class="ctrl-btn" id="btn-cb">Colorblind</button>
    <button class="ctrl-btn" id="btn-lang" style="display:none">By Language</button>
    <button class="ctrl-btn" id="btn-reset">Reset View</button>
  </div>
</div>
<div id="graph-container"><svg id="graph-svg"></svg></div>
<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// ── DATA INJECTION ──────────────────────────────────────────────────
// {{DATA_INJECTION}} — replaced by generate_viz.py
// {{TOURS_INJECTION}} — replaced by generate_viz.py
// {{CONFIG_INJECTION}} — replaced by generate_viz.py

// ── EXPAND RAW DATA ─────────────────────────────────────────────────
const nodes = _raw.n.map(n => ({id:n.i, label:n.l, group:n.g, degree:n.d, importance:n.p, language:n.ln||'other'}));
const edges = _raw.e.map(e => ({source:e.s, target:e.t, type:e.y, file:e.f}));
const isMultiLang = new Set(nodes.map(n=>n.language)).size > 1;

// ── LANGUAGE COLORS ─────────────────────────────────────────────────
const LANG_COLORS = {
  python:'#3572A5', javascript:'#F1E05A', typescript:'#3178C6',
  go:'#00ADD8', rust:'#DEA584', java:'#B07219',
  c:'#555555', cpp:'#F34B7D', ruby:'#CC342D', php:'#4F5D95', other:'#666688'
};

// ── PALETTES ────────────────────────────────────────────────────────
const PALETTE_DEFAULT = {
  gc: Object.assign({other:'#555570'}, typeof _groupColors !== 'undefined' ? _groupColors : {}),
  ec: {DEFINES:'#555580', CALLS:'#00d4ff', INHERITS:'#ff8c42', DECORATES:'#9c27b0', RAISES:'#ff4466'}
};
const PALETTE_CB = {
  gc: Object.assign({other:'#666688'}, typeof _groupColorsCB !== 'undefined' ? _groupColorsCB : {}),
  ec: {DEFINES:'#444466', CALLS:'#56B4E9', INHERITS:'#E69F00', DECORATES:'#CC79A7', RAISES:'#D55E00'}
};

let palette = PALETTE_DEFAULT;
let colorByLang = false;
let frozen = false;
let breathPhase = 0;
let breathInterval;
let activeTourIdx = -1;
let activeStepIdx = -1;
let simulation, svgEl, g, gLinks, gNodes, gLabels, zoomBehavior;
let linkSel, nodeSel, labelSel;

// ── NODE HELPERS ────────────────────────────────────────────────────
function nodeColor(d) {
  if (colorByLang) return LANG_COLORS[d.language] || LANG_COLORS.other;
  return palette.gc[d.group] || palette.gc.other || '#555570';
}
function edgeColor(d) { return palette.ec[d.type] || '#333'; }
function nodeRadius(d) {
  if (d.importance >= 30) return 10;
  if (d.importance >= 15) return 7;
  if (d.importance >= 5) return 4.5;
  return 2.5;
}

// ── SVG SETUP ───────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const W = container.clientWidth, H = container.clientHeight;
svgEl = d3.select('#graph-svg');

// Filters
const defs = svgEl.append('defs');
const blurFilter = defs.append('filter').attr('id','blur-cloud');
blurFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','1.5');
const glowFilter = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
glowFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','3').attr('result','blur');
const glowMerge = glowFilter.append('feMerge');
glowMerge.append('feMergeNode').attr('in','blur');
glowMerge.append('feMergeNode').attr('in','SourceGraphic');
const pulseFilter = defs.append('filter').attr('id','pulse-glow').attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
pulseFilter.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','6').attr('result','blur');
const pulseMerge = pulseFilter.append('feMerge');
pulseMerge.append('feMergeNode').attr('in','blur');
pulseMerge.append('feMergeNode').attr('in','SourceGraphic');

// Single <g> container — critical for zoom performance
g = svgEl.append('g').attr('id','graph-g');
zoomBehavior = d3.zoom().scaleExtent([0.05, 8])
  .on('zoom', e => g.attr('transform', e.transform));
svgEl.call(zoomBehavior);
gLinks  = g.append('g').attr('class','links');
gNodes  = g.append('g').attr('class','nodes');
gLabels = g.append('g').attr('class','labels');

// ── FORCE SIMULATION ────────────────────────────────────────────────
simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d=>d.id)
    .distance(d => d.type==='DEFINES'?35 : d.type==='INHERITS'?55 : 70)
    .strength(d => d.type==='DEFINES'?0.7 : d.type==='INHERITS'?0.45 : 0.25))
  .force('charge', d3.forceManyBody().strength(-30).distanceMax(250))
  .force('center', d3.forceCenter(W/2+80, H/2))
  .force('x', d3.forceX(W/2+80).strength(0.015))
  .force('y', d3.forceY(H/2).strength(0.015))
  .force('collision', d3.forceCollide().radius(d=>nodeRadius(d)+1))
  .on('tick', ticked);

// ── DRAW ELEMENTS ───────────────────────────────────────────────────
linkSel = gLinks.selectAll('line').data(edges).join('line')
  .attr('stroke', edgeColor)
  .attr('stroke-width', d => d.type==='CALLS'?0.8 : d.type==='INHERITS'?1.2 : 0.4)
  .attr('stroke-opacity', d => d.type==='DEFINES'?0.15 : 0.3);

nodeSel = gNodes.selectAll('circle').data(nodes).join('circle')
  .attr('r', nodeRadius)
  .attr('fill', nodeColor)
  .attr('stroke', '#0a0a1a').attr('stroke-width', 0.5)
  .attr('filter', d => d.importance<5?'url(#blur-cloud)' : d.importance>=30?'url(#glow)':null)
  .attr('fill-opacity', d => d.importance<5?0.4 : 0.9)
  .call(d3.drag().on('start',dragStart).on('drag',dragging).on('end',dragEnd));

labelSel = gLabels.selectAll('text').data(nodes).join('text')
  .text(d=>d.label)
  .attr('font-size', d => d.importance>=30?'10px' : d.importance>=15?'8px' : d.importance>=5?'6px':'0px')
  .attr('fill', nodeColor)
  .attr('fill-opacity', d => d.importance>=15?0.9 : d.importance>=5?0.5 : 0)
  .attr('stroke','#0a0a12').attr('stroke-width',3)
  .attr('stroke-opacity', d => d.importance>=15?0.9 : d.importance>=5?0.5 : 0)
  .attr('paint-order','stroke')
  .attr('dx', d => nodeRadius(d)+3).attr('dy','0.35em')
  .attr('pointer-events','none');

// ── TOOLTIP ─────────────────────────────────────────────────────────
const tooltip = d3.select('#tooltip');
nodeSel.on('mouseover', (ev,d) => {
  const langTag = d.language && d.language !== 'other' ? ` [${d.language}]` : '';
  tooltip.style('display','block')
    .html(`<strong>${d.id}</strong>${langTag}<br>Group: ${d.group}<br>Degree: ${d.degree} · Importance: ${d.importance}`);
}).on('mousemove', ev => {
  tooltip.style('left',(ev.clientX+12)+'px').style('top',(ev.clientY-10)+'px');
}).on('mouseout', () => tooltip.style('display','none'));

// ── TICK ────────────────────────────────────────────────────────────
function ticked() {
  linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('cx',d=>d.x).attr('cy',d=>d.y);
  labelSel.attr('x',d=>d.x).attr('y',d=>d.y);
}

// ── DRAG ────────────────────────────────────────────────────────────
function dragStart(ev,d) { if(!ev.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dragging(ev,d) { d.fx=ev.x; d.fy=ev.y; }
function dragEnd(ev,d) { if(!ev.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

// ── BREATHING ───────────────────────────────────────────────────────
function startBreathing() {
  breathInterval = setInterval(() => {
    if (frozen) return;
    breathPhase++;
    const wx = Math.sin(breathPhase*0.07)*18, wy = Math.cos(breathPhase*0.05)*12;
    simulation.force('x', d3.forceX(W/2+80+wx).strength(0.018))
              .force('y', d3.forceY(H/2+wy).strength(0.018));
    if (breathPhase%16===0) simulation.alpha(Math.max(simulation.alpha(),0.04)).restart();
  }, 500);
}
startBreathing();

// ── LABEL OPACITY HELPER ────────────────────────────────────────────
function setLabelOpacity(sel, dur, opFn) {
  sel.transition().duration(dur)
    .attr('fill', nodeColor)
    .attr('fill-opacity', opFn)
    .attr('stroke-opacity', opFn);
}

// ── TOUR SYSTEM ─────────────────────────────────────────────────────
function isTourNode(d, tour) {
  return tour.keywords.some(k => d.id===k || d.id.startsWith(k+'.') || d.id.startsWith(k));
}

function getConnectedNodes(tourNodeIds) {
  const connected = new Set();
  edges.forEach(e => {
    const sid = typeof e.source==='object'?e.source.id:e.source;
    const tid = typeof e.target==='object'?e.target.id:e.target;
    if (e.type!=='DEFINES') {
      if (tourNodeIds.has(sid)) connected.add(tid);
      if (tourNodeIds.has(tid)) connected.add(sid);
    }
  });
  return connected;
}

function activateTour(idx) {
  activeTourIdx = idx;
  activeStepIdx = -1;
  document.querySelectorAll('.tour-btn').forEach((b,i) => {
    b.classList.toggle('active', i===idx);
    if(i===idx) b.style.setProperty('--tour-color', tours[i].color||'#00d4ff');
  });

  if (idx < 0 || idx >= tours.length) { resetView(); return; }
  const tour = tours[idx];
  const tourColor = tour.color || '#00d4ff';

  // Render narrative
  const narDiv = document.getElementById('narrative');
  narDiv.innerHTML = '';
  narDiv.style.setProperty('--tour-color', tourColor);
  tour.steps.forEach((s,si) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = s.text;
    div.querySelectorAll('.tc').forEach(el => el.style.color = tourColor);
    div.onclick = () => spotlightStep(si);
    narDiv.appendChild(div);
  });

  // Highlight nodes
  const tourNodeIds = new Set();
  nodes.forEach(d => { if(isTourNode(d,tour)) tourNodeIds.add(d.id); });
  const connected = getConnectedNodes(tourNodeIds);

  nodeSel.transition().duration(600)
    .attr('fill', nodeColor)
    .attr('fill-opacity', d => tourNodeIds.has(d.id)?1 : connected.has(d.id)?0.3 : 0.04)
    .attr('filter', d => tourNodeIds.has(d.id)?'url(#glow)':null)
    .attr('r', d => tourNodeIds.has(d.id)?nodeRadius(d)*1.3:nodeRadius(d));

  setLabelOpacity(labelSel, 600, d =>
    tourNodeIds.has(d.id)?1 : connected.has(d.id)?0.2 : 0
  );
  labelSel.transition().duration(600)
    .attr('font-size', d => tourNodeIds.has(d.id)?'10px' : connected.has(d.id)?'6px':'0px');

  linkSel.transition().duration(600)
    .attr('stroke-opacity', d => {
      const sid = typeof d.source==='object'?d.source.id:d.source;
      const tid = typeof d.target==='object'?d.target.id:d.target;
      if(tourNodeIds.has(sid)&&tourNodeIds.has(tid)) return 0.7;
      if(tourNodeIds.has(sid)||tourNodeIds.has(tid)) return 0.15;
      return 0.01;
    });

  // Zoom to fit tour nodes
  zoomToNodes([...tourNodeIds]);
}

function spotlightStep(si) {
  activeStepIdx = si;
  document.querySelectorAll('.step').forEach((s,i) => s.classList.toggle('active',i===si));
  const tour = tours[activeTourIdx];
  const step = tour.steps[si];
  if (!step || !step.node) return;

  const target = nodes.find(n => n.id === step.node);
  if (!target) return;

  const tourNodeIds = new Set();
  nodes.forEach(d => { if(isTourNode(d,tour)) tourNodeIds.add(d.id); });

  // Zoom to target
  const scale = 1.3;
  svgEl.transition().duration(800).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2-(target.x*scale), H/2-(target.y*scale)).scale(scale)
  );

  // Spotlight: enlarge target, dim everything else
  nodeSel.transition().duration(500)
    .attr('r', d => d.id===target.id ? nodeRadius(d)*2.5 : nodeRadius(d))
    .attr('fill-opacity', d => d.id===target.id?1 : tourNodeIds.has(d.id)?0.12 : 0.01)
    .attr('filter', d => d.id===target.id?'url(#pulse-glow)' : null);

  setLabelOpacity(labelSel, 500, d =>
    d.id===target.id?1 : tourNodeIds.has(d.id)?0.08 : 0
  );

  linkSel.transition().duration(500)
    .attr('stroke-opacity', d => {
      const sid = typeof d.source==='object'?d.source.id:d.source;
      const tid = typeof d.target==='object'?d.target.id:d.target;
      if(sid===target.id||tid===target.id) return 0.8;
      return 0.01;
    });

  // Pulse ring
  const ring = gNodes.append('circle')
    .attr('cx',target.x).attr('cy',target.y)
    .attr('r', nodeRadius(target)*2.5)
    .attr('fill','none')
    .attr('stroke', tour.color||'#00d4ff')
    .attr('stroke-width',3)
    .attr('stroke-opacity',0.9)
    .attr('filter','url(#pulse-glow)');

  function pulse(i) {
    if(i>=4) { ring.remove(); activateTour(activeTourIdx); return; }
    ring.transition().duration(500)
      .attr('r', nodeRadius(target)*3.5).attr('stroke-opacity',0)
      .transition().duration(300)
      .attr('r', nodeRadius(target)*2.5).attr('stroke-opacity',0.8)
      .on('end', ()=>pulse(i+1));
  }
  pulse(0);
}

function zoomToNodes(nodeIds) {
  const pts = nodes.filter(n => nodeIds.includes(n.id));
  if (!pts.length) return;
  const xs = pts.map(n=>n.x), ys = pts.map(n=>n.y);
  const x0=Math.min(...xs)-60, x1=Math.max(...xs)+60, y0=Math.min(...ys)-60, y1=Math.max(...ys)+60;
  const bw=x1-x0, bh=y1-y0;
  const scale = Math.min(W/bw, H/bh, 2) * 0.85;
  const cx = (x0+x1)/2, cy = (y0+y1)/2;
  svgEl.transition().duration(800).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2-cx*scale, H/2-cy*scale).scale(scale)
  );
}

function resetView() {
  activeTourIdx = -1;
  activeStepIdx = -1;
  document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('narrative').innerHTML = '<div style="color:#666;font-size:0.8rem;padding:20px 0;">Select a tour to explore the codebase architecture.</div>';

  nodeSel.transition().duration(600)
    .attr('fill', nodeColor)
    .attr('fill-opacity', d => d.importance<5?0.4:0.9)
    .attr('filter', d => d.importance<5?'url(#blur-cloud)':d.importance>=30?'url(#glow)':null)
    .attr('r', nodeRadius);

  setLabelOpacity(labelSel, 600, d => d.importance>=15?0.9 : d.importance>=5?0.5 : 0);
  labelSel.transition().duration(600)
    .attr('font-size', d => d.importance>=30?'10px':d.importance>=15?'8px':d.importance>=5?'6px':'0px');

  linkSel.transition().duration(600)
    .attr('stroke', edgeColor)
    .attr('stroke-opacity', d => d.type==='DEFINES'?0.15:0.3);

  svgEl.transition().duration(800).call(
    zoomBehavior.transform, d3.zoomIdentity.translate(0,0).scale(1)
  );
}

// ── SEARCH ──────────────────────────────────────────────────────────
const searchBox = document.getElementById('search-box');
let searchTimeout;
searchBox.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = searchBox.value.trim().toLowerCase();
    if (!q) { if(activeTourIdx>=0) activateTour(activeTourIdx); else resetView(); return; }
    const matches = new Set();
    nodes.forEach(d => { if(d.id.toLowerCase().includes(q)||d.label.toLowerCase().includes(q)) matches.add(d.id); });
    const connected = getConnectedNodes(matches);

    nodeSel.transition().duration(400)
      .attr('fill-opacity', d => matches.has(d.id)?1 : connected.has(d.id)?0.2 : 0.03)
      .attr('r', d => matches.has(d.id)?nodeRadius(d)*1.5:nodeRadius(d))
      .attr('filter', d => matches.has(d.id)?'url(#glow)':null);

    setLabelOpacity(labelSel, 400, d => matches.has(d.id)?1 : 0);
    labelSel.transition().duration(400)
      .attr('font-size', d => matches.has(d.id)?'10px':'0px');

    linkSel.transition().duration(400)
      .attr('stroke-opacity', d => {
        const sid=typeof d.source==='object'?d.source.id:d.source;
        const tid=typeof d.target==='object'?d.target.id:d.target;
        if(matches.has(sid)||matches.has(tid)) return 0.5;
        return 0.01;
      });

    if(matches.size>0 && matches.size<=30) zoomToNodes([...matches]);
  }, 250);
});

// ── BUILD TOUR BUTTONS ──────────────────────────────────────────────

document.getElementById('btn-reset').onclick = resetView;

// ── KEYBOARD NAV ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target === searchBox) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') {
    e.preventDefault();
    if (activeTourIdx>=0 && activeStepIdx < tours[activeTourIdx].steps.length-1) spotlightStep(activeStepIdx+1);
    else if (activeTourIdx<0 && tours.length) activateTour(0);
  }
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') {
    e.preventDefault();
    if (activeStepIdx>0) spotlightStep(activeStepIdx-1);
  }
  if (e.key==='Escape') resetView();
});

// ── SEARCH SUGGESTIONS ──────────────────────────────────────────────
const suggestionsEl = document.getElementById('search-suggestions');
const topNodes = [...nodes].sort((a,b) => b.importance - a.importance).slice(0, 6);
if (topNodes.length) {
  suggestionsEl.style.display = 'block';
  suggestionsEl.innerHTML = 'Try: ' + topNodes.map(n =>

  ).join('');

// ── TOUR HELP ──────────────────────────────────────────────────────
document.getElementById('tour-help-link').onclick = function() {
  const nar = document.getElementById('narrative');
  const isShowing = nar.dataset.showingHelp === '1';
  if (isShowing) {
    nar.dataset.showingHelp = '';

    return;
  }

  nar.innerHTML = `
    <div style="color:#aab;font-size:0.8rem;line-height:1.6;padding:8px 0;">
      <strong style="color:#dde;">Adding more tours</strong><br><br>
      Tours are defined in a <code style="color:#7788aa;">tours.json</code> file and baked into this HTML at generation time. To add or edit tours:<br><br>
      1. Edit the <code style="color:#7788aa;">tours.json</code> file &mdash; each tour needs a <em>name</em>, <em>color</em>, <em>keywords</em> (node ID prefixes to match), and <em>steps</em> with narrative text and a target node ID.<br><br>
      2. Re-run the generator:<br>
      <code style="color:#7788aa;font-size:0.75rem;">python generate_viz.py graph.json tours.json output.html</code><br><br>

};

// ── TOUR SUGGESTION ENGINE ──────────────────────────────────────────
function discoverClusters() {
  // Group nodes by their top-level module prefix
  const groups = {};
  nodes.forEach(n => {
    const g = n.group || 'other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(n);
  });

  // Score each group: sum of importance, count of inter-group edges
  const suggestions = [];
  for (const [groupName, groupNodes] of Object.entries(groups)) {
    if (groupName === 'other' || groupNodes.length < 2) continue;
    const nodeIds = new Set(groupNodes.map(n => n.id));
    const totalImportance = groupNodes.reduce((s, n) => s + n.importance, 0);
    const internalEdges = edges.filter(e => {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      return nodeIds.has(sid) && nodeIds.has(tid) && e.type !== 'DEFINES';
    }).length;
    const topSymbols = [...groupNodes].sort((a, b) => b.importance - a.importance).slice(0, 5);
    suggestions.push({
      name: groupName.charAt(0).toUpperCase() + groupName.slice(1),
      score: totalImportance + internalEdges * 2,
      nodeCount: groupNodes.length,
      edgeCount: internalEdges,
      topSymbols,
      keywords: [groupName + '.'],
      type: 'module'
    });
  }

  // Cross-language tour (if multi-lang)
  if (isMultiLang) {
    const crossEdges = edges.filter(e => {
      const sn = nodes.find(n => n.id === (typeof e.source === 'object' ? e.source.id : e.source));
      const tn = nodes.find(n => n.id === (typeof e.target === 'object' ? e.target.id : e.target));
      return sn && tn && sn.language !== tn.language && e.type !== 'DEFINES';
    });
    if (crossEdges.length > 0) {
      const crossNodes = new Set();
      crossEdges.forEach(e => {
        crossNodes.add(typeof e.source === 'object' ? e.source.id : e.source);
        crossNodes.add(typeof e.target === 'object' ? e.target.id : e.target);
      });
      const topCross = [...crossNodes].map(id => nodes.find(n => n.id === id)).filter(Boolean)
        .sort((a, b) => b.importance - a.importance).slice(0, 5);
      suggestions.push({
        name: 'Cross-Language Boundaries',
        score: crossEdges.length * 5,
        nodeCount: crossNodes.size,
        edgeCount: crossEdges.length,
        topSymbols: topCross,
        keywords: [...crossNodes].slice(0, 10),
        type: 'cross-language'
      });
    }
  }

  // "Most Important" suggestion if not already a tour
  const hasImportantTour = tours.some(t => t.name.toLowerCase().includes('important'));
  if (!hasImportantTour) {
    const topAll = [...nodes].sort((a, b) => b.importance - a.importance).slice(0, 15);
    suggestions.unshift({
      name: 'Most Important Symbols',
      score: 99999,
      nodeCount: topAll.length,
      edgeCount: 0,
      topSymbols: topAll.slice(0, 5),
      keywords: topAll.map(n => n.id),
      type: 'importance'
    });
  }

  return suggestions.sort((a, b) => b.score - a.score);
}

const suggestPanel = document.getElementById('suggest-panel');
let suggestVisible = false;

document.getElementById('btn-suggest').onclick = function() {
  suggestVisible = !suggestVisible;
  if (!suggestVisible) { suggestPanel.style.display = 'none'; return; }

  const suggestions = discoverClusters();
  // Filter out groups that already have tours
  const existingKeywords = new Set();
  tours.forEach(t => t.keywords.forEach(k => existingKeywords.add(k)));

  const novel = suggestions.filter(s =>
    !s.keywords.every(k => existingKeywords.has(k))
  );

  suggestPanel.style.display = 'block';
  if (!novel.length) {
    suggestPanel.innerHTML = '<div class="sg-info">All major clusters already have tours. Nice coverage!</div>';
    return;
  }

  suggestPanel.innerHTML = '<div class="sg-info">Click a suggestion to preview it on the graph:</div>' +
    novel.slice(0, 8).map((s, i) => `
      <div class="sg-tour" data-idx="${i}">
        <strong>${s.name}</strong>
        <span style="color:#556;font-size:0.7rem;"> &mdash; ${s.nodeCount} symbols, ${s.edgeCount} connections</span>
        <div class="sg-nodes">Top: ${s.topSymbols.map(n => n.label).join(', ')}</div>
      </div>
    `).join('');

  const novelRef = novel; // closure reference
  suggestPanel.querySelectorAll('.sg-tour').forEach(el => {
    el.onclick = () => {
      const s = novelRef[+el.dataset.idx];
      // Preview: highlight these nodes on the graph
      const ids = new Set(s.type === 'importance' ? s.keywords : []);
      if (s.type !== 'importance') {
        nodes.forEach(n => { if (s.keywords.some(k => n.id === k || n.id.startsWith(k))) ids.add(n.id); });
      }
      const connected = getConnectedNodes(ids);

      nodeSel.transition().duration(500)
        .attr('fill-opacity', d => ids.has(d.id) ? 1 : connected.has(d.id) ? 0.2 : 0.03)
        .attr('r', d => ids.has(d.id) ? nodeRadius(d) * 1.3 : nodeRadius(d))
        .attr('filter', d => ids.has(d.id) ? 'url(#glow)' : null);
      setLabelOpacity(labelSel, 500, d => ids.has(d.id) ? 1 : 0);
      labelSel.transition().duration(500)
        .attr('font-size', d => ids.has(d.id) ? '10px' : '0px');
      linkSel.transition().duration(500)
        .attr('stroke-opacity', d => {
          const sid = typeof d.source === 'object' ? d.source.id : d.source;
          const tid = typeof d.target === 'object' ? d.target.id : d.target;
          if (ids.has(sid) || ids.has(tid)) return 0.5;
          return 0.01;
        });
      if (ids.size > 0 && ids.size <= 50) zoomToNodes([...ids]);
    };
  });
};

// ── COPY PROMPT FOR CLAUDE ─────────────────────────────────────────
document.getElementById('btn-copy-prompt').onclick = function() {
  const btn = this;

  // Gather graph context
  const topByImportance = [...nodes].sort((a, b) => b.importance - a.importance).slice(0, 25);
  const groupSummary = {};
  nodes.forEach(n => {
    if (!groupSummary[n.group]) groupSummary[n.group] = { count: 0, topImportance: 0 };
    groupSummary[n.group].count++;
    groupSummary[n.group].topImportance = Math.max(groupSummary[n.group].topImportance, n.importance);
  });
  const groupLines = Object.entries(groupSummary)
    .sort((a, b) => b[1].topImportance - a[1].topImportance)
    .map(([g, v]) => `  - ${g}: ${v.count} symbols (peak importance ${v.topImportance})`).join('\n');
  const topLines = topByImportance.map(n =>
    `  - ${n.id} (group: ${n.group}, importance: ${n.importance}, lang: ${n.language})`
  ).join('\n');

  const existingTourNames = tours.map(t => t.name).join(', ') || '(none yet)';

  const langInfo = isMultiLang
    ? `Languages: ${Object.entries(langCounts).sort((a,b)=>b[1]-a[1]).map(([l,c])=>`${l} (${c})`).join(', ')}\n`
    : '';

  const prompt = `I have an HCE (Hypergraph Code Explorer) visualization of a codebase with ${nodes.length} symbols and ${edges.length} edges.
${langInfo}
Groups in the graph:
${groupLines}

Top 25 symbols by importance:
${topLines}

Existing tours: ${existingTourNames}

Please suggest 3-5 new guided tours for this codebase. For each tour, provide:
- name: A short descriptive title
- color: A hex color that looks good on a dark (#0a0a1a) background
- keywords: Array of node ID prefixes that belong to this tour
- steps: 4-6 narrative steps, each with "text" (HTML with <strong class='tc'>symbol</strong> tags) and "node" (the target node ID)

Format the output as a JSON object I can merge into my tours.json file:
{
  "tours": [
    {
      "name": "Tour Name",
      "color": "#hex",
      "keywords": ["prefix1", "prefix2"],
      "steps": [{"text": "...", "node": "symbol.id"}, ...]
    }
  ]
}

Focus on architectural patterns, data flow, and subsystems not already covered by the existing tours. Each narrative step should explain why the symbol matters and what would break without it.`;

  navigator.clipboard.writeText(prompt).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt for Claude'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback for non-HTTPS contexts
    const ta = document.createElement('textarea');
    ta.value = prompt; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt for Claude'; btn.classList.remove('copied'); }, 2000);
  });
};

resetView();
